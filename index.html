<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ผจญภัยป่าไตรยางศ์</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Sarabun', sans-serif; 
            margin: 0; 
            overflow: hidden; /* ป้องกันหน้าจอเลื่อน */
            background-color: #1b5e20; /* สีเขียวเข้มพื้นหลัง */
            color: white;
            text-align: center;
        }

        /* --- กล่องสำหรับแต่ละฉาก --- */
        .scene {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            display: none; 
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .active { display: flex; }

        /* --- หน้าจอเริ่มเกม --- */
        #scene-start {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1542273917363-3b1817f69a5d?q=80&w=1000') center/cover;
        }
        h1 { font-size: 40px; color: #ffca28; text-shadow: 2px 2px 4px #000; }
        
        /* --- ป๊อปอัปเลือกตัวละคร --- */
        .modal {
            background: white; color: black; padding: 30px; border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: none; flex-direction: column; gap: 15px;
            width: 80%; max-width: 400px; z-index: 10;
        }
        .char-select { display: flex; justify-content: center; gap: 20px; font-size: 50px; cursor: pointer; }
        .char-btn { border: 2px solid transparent; border-radius: 10px; padding: 10px; background: #f0f0f0; }
        .char-btn.selected { border-color: #ff9800; background: #ffe0b2; }
        input { padding: 10px; font-size: 18px; border-radius: 10px; border: 1px solid #ccc; text-align: center; }

        /* --- ปุ่มกด --- */
        .btn { 
            background-color: #ff9800; color: white; border: none; 
            padding: 15px 30px; font-size: 22px; font-weight: bold;
            border-radius: 15px; cursor: pointer; box-shadow: 0 4px #e65100;
            transition: 0.2s;
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 0; }

        /* --- แผนที่ผจญภัย --- */
        #scene-map {
            background: #4caf50; /* สีพื้นหญ้าจำลอง */
            position: relative;
        }
        /* เส้นทางเดินบนแผนที่ (ตกแต่ง) */
        .path-line {
            position: absolute; border: 4px dashed #795548; z-index: 1;
        }
        /* จุดภารกิจ */
        .mission-node {
            position: absolute; width: 60px; height: 60px; 
            background: #ff5722; border-radius: 50%; border: 4px solid white;
            display: flex; justify-content: center; align-items: center;
            font-size: 24px; font-weight: bold; cursor: pointer; z-index: 2;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        /* ตัวละครบนแผนที่ */
        #player-avatar {
            position: absolute; font-size: 40px; z-index: 3;
            transition: all 1s ease-in-out; /* ทำให้เดินสมูท 1 วินาที */
            /* จุดเริ่มต้น */
            top: 80%; left: 20%; 
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

    <div id="scene-start" class="scene active">
        <h1>🏕️ ผจญภัยป่าไตรยางศ์</h1>
        <button class="btn" onclick="openCharacterSelect()">▶ เริ่มเกม</button>
    </div>

    <div id="character-modal" class="modal" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);">
        <h2 style="margin: 0; color: #ff9800;">สร้างนักสำรวจ</h2>
        <input type="text" id="playerName" placeholder="พิมพ์ชื่อของคุณ...">
        <div class="char-select">
            <div class="char-btn selected" id="char-boy" onclick="selectChar('👦')">👦</div>
            <div class="char-btn" id="char-girl" onclick="selectChar('👧')">👧</div>
        </div>
        <button class="btn" onclick="enterMap()">ออกเดินทาง!</button>
    </div>

    <div id="scene-map" class="scene">
        <h2 style="position: absolute; top: 20px; background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 10px;">
            แผนที่ป่าลึกลับ (นักสำรวจ: <span id="display-name"></span>)
        </h2>
        
        <div id="player-avatar">👦</div>

        <div class="mission-node" style="top: 60%; left: 40%;" onclick="walkToMission(1, 60, 40)">1</div>
        <div class="mission-node" style="top: 30%; left: 30%;" onclick="walkToMission(2, 30, 30)">2</div>
        <div class="mission-node" style="top: 40%; left: 70%;" onclick="walkToMission(3, 40, 70)">3</div>
        <div class="mission-node" style="top: 15%; left: 80%; background: #9c27b0;" onclick="walkToMission(4, 15, 80)">👑</div>
    </div>

    <script>
        let player = { name: "", avatar: "👦" };

        // 1. เปิดป๊อปอัปเลือกตัวละคร
        function openCharacterSelect() {
            // (อนาคต: ใส่คำสั่งเล่นเสียงดนตรีตรงนี้)
            document.getElementById('character-modal').style.display = 'flex';
        }

        // 2. เลือกตัวละคร
        function selectChar(avatarEmoji) {
            player.avatar = avatarEmoji;
            document.getElementById('char-boy').classList.remove('selected');
            document.getElementById('char-girl').classList.remove('selected');
            if(avatarEmoji === '👦') document.getElementById('char-boy').classList.add('selected');
            if(avatarEmoji === '👧') document.getElementById('char-girl').classList.add('selected');
        }

        // 3. ยืนยันเข้าสู่แผนที่
        function enterMap() {
            let nameInput = document.getElementById('playerName').value;
            if(nameInput.trim() === "") {
                alert("อย่าลืมตั้งชื่อก่อนนะ!");
                return;
            }
            player.name = nameInput;
            
            // อัปเดตข้อมูลบนแผนที่
            document.getElementById('display-name').innerText = player.name;
            document.getElementById('player-avatar').innerText = player.avatar;
            
            // ปิดหน้าแรกและป๊อปอัป เปิดหน้าแผนที่
            document.getElementById('character-modal').style.display = 'none';
            document.getElementById('scene-start').classList.remove('active');
            document.getElementById('scene-map').classList.add('active');
        }

        // 4. สั่งตัวละครเดินบนแผนที่
        function walkToMission(missionNumber, topPercent, leftPercent) {
            let avatar = document.getElementById('player-avatar');
            
            // (อนาคต: ใส่คำสั่งเสียงเดินป่าสวบสาบตรงนี้)
            
            // สั่งให้ตัวละครขยับไปที่ตำแหน่งของภารกิจ
            avatar.style.top = topPercent + '%';
            avatar.style.left = leftPercent + '%';

            // รอ 1 วินาทีให้เดินเสร็จ ค่อยเด้งเข้าเกม
            setTimeout(() => {
                alert("เข้าสู่ภารกิจที่ " + (missionNumber === 4 ? "บอส!" : missionNumber));
                // ตรงนี้เราจะเขียนโค้ดสลับหน้าจอเข้าไปยังมินิเกมของแต่ละด่านต่อไป
            }, 1200);
        }
    </script>
</body>
</html>
