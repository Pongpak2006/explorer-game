<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>นักสำรวจป่า ไตรยางศ์ ป.2</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Sarabun', sans-serif; 
            background-color: #2e7d32; /* สีเขียวป่า */
            color: white;
            text-align: center; 
            margin: 0; 
            padding: 20px; 
        }
        .scene {
            background: rgba(0, 0, 0, 0.7); 
            max-width: 600px; 
            margin: 0 auto; 
            padding: 30px; 
            border-radius: 20px; 
            border: 4px solid #ffca28;
            display: none; /* ซ่อนทุกหน้าไว้ก่อน */
        }
        .active { display: block; /* แสดงเฉพาะหน้าที่เปิดอยู่ */ }
        h1 { color: #ffca28; font-size: 32px; }
        input { padding: 10px; font-size: 18px; border-radius: 10px; text-align: center; }
        .btn { 
            background-color: #ff9800; color: white; border: none; 
            padding: 15px 30px; font-size: 20px; font-weight: bold;
            border-radius: 15px; cursor: pointer; margin-top: 20px;
        }
        .btn:active { transform: translateY(4px); }
        .diamond-bar { font-size: 24px; color: #00e5ff; font-weight: bold; margin-bottom: 20px; }
        .game-area { background: white; color: black; padding: 20px; border-radius: 10px; font-size: 40px; margin: 20px 0; }
    </style>
</head>
<body>

    <div id="scene-start" class="scene active">
        <h1>🏕️ นักสำรวจป่า ไตรยางศ์ 🏕️</h1>
        <p>ยินดีต้อนรับนักสำรวจน้อย!</p>
        <input type="text" id="playerName" placeholder="พิมพ์ชื่อนักสำรวจที่นี่...">
        <br>
        <p>เลือกเพศ: 
            <input type="radio" name="gender" value="ชาย" checked> ชาย 
            <input type="radio" name="gender" value="หญิง"> หญิง
        </p>
        <button class="btn" onclick="startGame()">เริ่มการผจญภัย!</button>
    </div>

    <div id="scene-stage1" class="scene">
        <div class="diamond-bar">💎 เพชรที่มี: <span id="diamond-count">0</span></div>
        <h1>ภารกิจที่ 1: หีบอักษรกลาง</h1>
        <p>ไก่ จิก เด็ก ตาย เด็ก ตาย บน ปาก โอ่ง</p>
        <p>⏳ เวลาเหลือ: <span id="time-left" style="color: red;">15</span> วินาที</p>
        
        <div class="game-area">
            <button class="btn" onclick="collectLetter('ก', true)">ก</button>
            <button class="btn" onclick="collectLetter('ข', false)">ข</button>
            <button class="btn" onclick="collectLetter('ป', true)">ป</button>
            <button class="btn" onclick="collectLetter('ฮ', false)">ฮ</button>
        </div>
        <button class="btn" onclick="nextStage()" style="background-color: #4caf50;">จบด่าน 1 ไปต่อ</button>
    </div>

    <div id="scene-end" class="scene">
        <h1>🎉 สรุปผลการผจญภัย 🎉</h1>
        <p>ชื่อนักสำรวจ: <span id="show-name"></span></p>
        <p>เพชรที่สะสมได้: <span id="show-diamonds"></span> 💎</p>
        <p>ระดับความเก่ง: 🌟🌟🌟</p>
        <button class="btn" onclick="saveToSheets()">บันทึกคะแนนส่งคุณครู</button>
    </div>

    <script>
        // ตัวแปรเก็บข้อมูลผู้เล่น
        let player = { name: "", gender: "", diamonds: 0 };
        let timer;
        let timeLeft = 15; // จับเวลาจำลอง 15 วินาที

        // ฟังก์ชันเปลี่ยนหน้าจอ
        function showScene(sceneId) {
            document.querySelectorAll('.scene').forEach(el => el.classList.remove('active'));
            document.getElementById(sceneId).classList.add('active');
        }

        // เริ่มเกม
        function startGame() {
            let nameInput = document.getElementById('playerName').value;
            if(nameInput === "") {
                alert("อย่าลืมตั้งชื่อนักสำรวจนะ!");
                return;
            }
            player.name = nameInput;
            
            // เปิดเสียงตื่นเต้น (ถ้ามีไฟล์เสียงสามารถใส่ตรงนี้ได้)
            alert("พร้อมลุยป่าดงดิบแล้วใช่ไหม! ไปกันเลย!");
            
            showScene('scene-stage1');
            startTimer();
        }

        // ระบบจับเวลา
        function startTimer() {
            timer = setInterval(() => {
                timeLeft--;
                document.getElementById('time-left').innerText = timeLeft;
                if(timeLeft <= 0) {
                    clearInterval(timer);
                    alert("หมดเวลา! สรุปคะแนนกันเถอะ");
                    nextStage();
                }
            }, 1000);
        }

        // ระบบคลิกเก็บอักษร (จำลองของตกลงมา)
        function collectLetter(letter, isCorrect) {
            if(isCorrect) {
                player.diamonds += 1; // ได้เพชร
                alert("✅ ถูกต้อง! เก็บ " + letter + " ได้ 1 เพชร");
            } else {
                alert("❌ ผิดจ้าา " + letter + " ไม่ใช่อักษรกลางนะ");
            }
            document.getElementById('diamond-count').innerText = player.diamonds;
        }

        // ไปหน้าจบเกม
        function nextStage() {
            clearInterval(timer); // หยุดเวลา
            document.getElementById('show-name').innerText = player.name;
            document.getElementById('show-diamonds').innerText = player.diamonds;
            showScene('scene-end');
        }

        // ระบบส่งข้อมูลเข้า Google Sheets
        function saveToSheets() {
            alert("กำลังส่งคะแนนไปหาคุณครู... (เชื่อมกับ Google Sheets ได้ที่นี่)");
            // โค้ด Fetch แบบที่ทำในเวอร์ชันแรกจะถูกนำมาใส่ตรงนี้
        }
    </script>
</body>
</html>
