<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>นักสำรวจน้อยตะลุยเกาะคำการันต์</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Sarabun', sans-serif; 
            background-color: #e0f7fa; 
            text-align: center; 
            margin: 0; 
            padding: 20px; 
        }
        #game-board { 
            background: white; 
            max-width: 500px; 
            margin: 0 auto; 
            padding: 30px 20px; 
            border-radius: 20px; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.2); 
            border: 4px solid #00796b;
        }
        h1 { color: #00796b; font-size: 26px; }
        .question { font-size: 30px; font-weight: bold; margin: 30px 0; color: #d32f2f; }
        .btn-container { display: flex; justify-content: center; gap: 20px; }
        .btn { 
            background-color: #ff9800; 
            color: white; 
            border: none; 
            padding: 15px 30px; 
            font-size: 24px; 
            font-weight: bold;
            border-radius: 15px; 
            cursor: pointer; 
            width: 45%; 
            box-shadow: 0 6px #e65100; 
            transition: 0.1s; 
        }
        .btn:active { box-shadow: 0 0; transform: translateY(6px); }
        #loading { font-size: 18px; color: #00796b; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="game-board">
        <h1>🌴 ด่านที่ 1: ป่าแห่งความจำ 🌴</h1>
        <p id="loading">⏳ กำลังโหลดภารกิจจาก Google Sheets...</p>
        
        <div id="question-container" style="display: none;">
            <div id="question-text" class="question"></div>
            <div class="btn-container">
                <button class="btn" id="btn1" onclick="checkAnswer(1)"></button>
                <button class="btn" id="btn2" onclick="checkAnswer(2)"></button>
            </div>
        </div>
    </div>

    <script>
        // นี่คือลิงก์ Google Sheets ของคุณครูที่ฉันใส่ไว้ให้แล้วค่ะ
        const scriptUrl = 'https://script.google.com/macros/s/AKfycbxQHu86mWczbFPaJ_JGHih5nIHxMye7S01qevDns2KSYDs5_lHWVOIFqJ8TUHc15TfY/exec';
        let currentQuestion = {};

        // ระบบจะวิ่งไปดึงโจทย์มาทันทีที่เปิดเว็บ
        window.onload = function() {
            fetch(scriptUrl)
                .then(response => response.json())
                .then(result => {
                    if(result.status === 'success' && result.data.length > 0) {
                        // ดึงโจทย์ข้อแรก (ที่พิมพ์ไว้ว่า วันเสา...) มาแสดง
                        currentQuestion = result.data[0];
                        document.getElementById('loading').style.display = 'none';
                        document.getElementById('question-container').style.display = 'block';
                        
                        document.getElementById('question-text').innerText = currentQuestion.questionText;
                        document.getElementById('btn1').innerText = currentQuestion.choice1;
                        document.getElementById('btn2').innerText = currentQuestion.choice2;
                    } else {
                        document.getElementById('loading').innerText = 'ไม่พบคำถามในระบบ';
                    }
                })
                .catch(error => {
                    document.getElementById('loading').innerText = 'เกิดข้อผิดพลาดในการโหลดข้อมูล';
                });
        }

        // ระบบตรวจคำตอบ
        function checkAnswer(selectedChoice) {
            if(selectedChoice == currentQuestion.correctAnswer) {
                alert('🎉 เก่งมาก! ตอบถูกครับ/ค่ะ 🎉\nได้รับไอเทม: แผนที่นักสำรวจ 🗺️');
            } else {
                alert('❌ ยังไม่ถูกน้าา ลองดูดีๆ อีกครั้งนะคะ ❌');
            }
        }
    </script>
</body>
</html>
