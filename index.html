<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>ตะลุยป่า ไตรยางศ์</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root {
            --bg-start: url('https://img.magnific.com/free-vector/forest-scene-with-various-forest-trees_1308-57640.jpg?semt=ais_hybrid&w=740&q=80');
            --char-boy: url('https://i.postimg.cc/mrSpgYMf/2.png');
            --char-girl: url('https://i.postimg.cc/TYysJW8r/1.png');
            --icon-school: url('https://i.postimg.cc/q7gCZn0d/1.png'); 
            --icon-forest: url('https://i.postimg.cc/zGGLVWyN/2.png'); 
            --icon-cave: url('https://i.postimg.cc/g2txRJhM/3.png'); 
            --icon-camp: url('https://i.postimg.cc/8CFjbSBD/4.png'); 
            --icon-temple: url('https://i.postimg.cc/Bb3bsPrk/5.png'); 
            --chest-closed: url('https://cdn-icons-png.flaticon.com/512/4230/4230569.png');
            --chest-open: url('https://cdn-icons-png.flaticon.com/512/4230/4230571.png');
            --boss-mask: url('https://cdn-icons-png.flaticon.com/512/2983/2983610.png');
            --leaf: url('https://cdn-icons-png.flaticon.com/512/3264/3264104.png');
        }

        * { font-family: 'Sarabun', sans-serif; box-sizing: border-box; }

        html, body {
            margin: 0; padding: 0; width: 100vw; height: 100dvh;
            overflow: hidden; background-color: #000; color: white; 
            user-select: none; touch-action: none;
        }

        .scene {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: var(--bg-start); background-size: cover; background-position: center bottom;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .scene.active { display: flex; }

        /* ================= เอฟเฟกต์บรรยากาศ (หิ่งห้อย & ใบไม้ร่วง) ================= */
        .firefly {
            position: absolute; width: 4px; height: 4px; background: #cddc39;
            border-radius: 50%; box-shadow: 0 0 10px 4px #cddc39;
            animation: fly linear infinite alternate; pointer-events: none; z-index: 2; opacity: 0.8;
        }
        @keyframes fly { 0% { transform: translate(0, 0) scale(1); opacity: 0.5; } 100% { transform: translate(30px, -50px) scale(1.5); opacity: 1; } }

        .falling-leaf {
            position: absolute; top: -50px; width: 25px; height: 25px;
            background: var(--leaf) no-repeat center/contain;
            pointer-events: none; z-index: 3; opacity: 0.6;
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.7; }
            90% { opacity: 0.7; }
            100% { transform: translate(60px, 100vh) rotate(360deg); opacity: 0; }
        }

        /* ================= UI หน้าแรก (ลายไม้สมจริง) ================= */
        .wood-panel {
            position: relative;
            padding: 30px 30px 45px 30px;
            background-color: #8b5a2b;
            background-image: repeating-linear-gradient(45deg, rgba(0,0,0,0.05) 0px, rgba(0,0,0,0.05) 2px, transparent 2px, transparent 4px), linear-gradient(to bottom, #a1662f, #70431c);
            border: 6px solid #4a2e15; border-radius: 20px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5), 0 15px 25px rgba(0,0,0,0.8);
            text-align: center; width: 85%; max-width: 420px; z-index: 100;
        }
        .game-title {
            white-space: nowrap !important;
            font-size: clamp(32px, 7vw, 48px); 
            color: #ffca28; text-shadow: 2px 2px 0 #4a2e15, 0 0 10px #000;
            margin: 0 0 20px 0; font-weight: 900; line-height: 1.2;
        }
        #input-name {
            padding: 12px; font-size: 20px; border-radius: 10px; border: 3px solid #5c3a21;
            text-align: center; margin-bottom: 20px; width: 100%;
            background: #fff8e1; color: #4a2e15; font-weight: bold; outline: none;
        }
        .wood-btn {
            background: linear-gradient(to bottom, #d49a57, #8b5a2b);
            border: 3px solid #4a2e15; border-radius: 15px; color: #fff;
            font-size: 22px; font-weight: 900; padding: 12px 30px; cursor: pointer;
            box-shadow: 0 6px 0 #4a2e15; transition: 0.1s; width: 100%;
        }
        .wood-btn:active { transform: translateY(6px); box-shadow: 0 0 0 #4a2e15; }

        .manual-link {
            position: fixed; bottom: 15px; left: 15px;
            font-size: 30px; cursor: pointer; z-index: 100;
            transition: 0.2s; background: rgba(255,255,255,0.9); 
            border-radius: 50%; width: 55px; height: 55px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        .manual-link:hover { transform: scale(1.1); }

        /* ปุ่มด้านบน (Home & Music) */
        .top-btn {
            position: absolute; top: 15px; z-index: 2000;
            background: #fff; border: 4px solid #d32f2f; border-radius: 50%;
            width: 50px; height: 50px; display: flex; justify-content: center; align-items: center;
            font-size: 24px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.5); transition: 0.1s;
        }
        .top-btn:active { transform: scale(0.9); }
        #home-btn { left: 15px; display: none; }
        #music-btn { right: 15px; border-color: #1976d2; }

        /* ================= เลือกตัวละคร ================= */
        .char-box {
            background: rgba(255,255,255,0.2); border: 4px solid transparent;
            border-radius: 20px; padding: 15px; cursor: pointer; transition: 0.2s; text-align: center; flex: 1;
        }
        .char-box:active { background: rgba(255,255,255,0.5); border: 4px solid #ffca28; }
        .char-model-select {
            width: 100%; height: 90px; background-size: contain; background-repeat: no-repeat; background-position: center;
            animation: breathe 1.5s infinite ease-in-out; filter: drop-shadow(0px 8px 4px rgba(0,0,0,0.5));
        }

        @keyframes breathe { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-5px) scale(1.02); } }

        /* ================= แผนที่: เส้น & ไอคอน ================= */
        #svg-path { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; pointer-events: none; }
        
        .map-node {
            position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: center;
            transform: translate(-50%, -50%); z-index: 20;
            animation: bounceNode 2s infinite ease-in-out;
        }
        @keyframes bounceNode { 0%, 100% { margin-top: 0; } 50% { margin-top: -8px; } }

        .node-img { width: 85px; height: 85px; background-size: contain; background-repeat: no-repeat; background-position: center; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.6)); }
        .node-label {
            background: #fff; color: #4a2e15; border: 3px solid #4a2e15; padding: 2px 10px;
            border-radius: 15px; font-weight: 900; font-size: 14px; margin-top: 0px; white-space: nowrap;
        }

        #map-avatar { 
            position: absolute; z-index: 50; transition: all 1.2s ease-in-out; 
            width: 70px; height: 70px; background-size: contain; background-repeat: no-repeat; background-position: center;
            transform: translate(-50%, -50%); margin-top: -25px; 
            filter: drop-shadow(0 6px 4px rgba(0,0,0,0.6));
            animation: breathe 1s infinite alternate ease-in-out;
        }

        @media (min-width: 768px) {
            .node-img { width: 120px; height: 120px; }
            .node-label { font-size: 16px; padding: 4px 15px; }
            #map-avatar { width: 100px; height: 100px; margin-top: -35px; }
        }

        /* ================= กล่องนำทาง ================= */
        #dialogue-popup {
            position: absolute; background: #fff8e1; border: 4px solid #8b3a0f; border-radius: 15px;
            padding: 10px 15px; color: #333; font-weight: bold; text-align: center;
            box-shadow: 0 8px 15px rgba(0,0,0,0.6); z-index: 1000; display: none; 
            width: max-content; max-width: 220px;
            transform: translate(-50%, -100%); margin-top: -65px;
            flex-direction: column; align-items: center; justify-content: center; gap: 5px;
        }
        #dialogue-text { font-size: 16px; word-break: keep-all; }
        .dialogue-next { color: #d32f2f; font-size: 14px; cursor: pointer; font-weight: 900; animation: breathe 1s infinite alternate; }
        .dialogue-arrow {
            content: ''; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%);
            border-width: 10px 10px 0; border-style: solid; border-color: #8b3a0f transparent transparent transparent;
        }

        /* ================= เกม & หีบสมบัติ ================= */
        #game-chest {
            width: 220px; height: 220px; background-image: var(--chest-closed);
            background-size: contain; background-repeat: no-repeat; background-position: center;
            cursor: pointer; z-index: 200; display: none; animation: floatChest 2s infinite ease-in-out;
            filter: drop-shadow(0 15px 15px rgba(0,0,0,0.8));
        }
        @keyframes floatChest { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        .game-item {
            position: absolute; width: 75px; height: 75px; background: #fff; border: 4px solid #4a2e15; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; font-size: 35px; font-weight: 900; color: #111; cursor: pointer;
            box-shadow: 0 6px 0 #4a2e15; pointer-events: auto;
        }

        .hud {
            position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.8); border: 3px solid #ffca28;
            padding: 5px 15px; border-radius: 15px; display: none; gap: 15px; font-size: 20px; font-weight: 900; z-index: 500;
        }

        /* ================= Progress Bar ================= */
        .progress-bar {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; height: 25px; background: rgba(0,0,0,0.7);
            border: 3px solid #ffca28; border-radius: 15px; overflow: hidden; z-index: 100;
            display: none;
        }
        .progress-fill {
            height: 100%; background: linear-gradient(90deg, #4caf50, #8bc34a);
            transition: width 0.3s ease; display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 12px; font-weight: bold; text-shadow: 1px 1px 2px #000;
        }

        #basket {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 150px; height: 100px; background: url('https://cdn-icons-png.flaticon.com/512/3752/3752674.png') center/contain no-repeat;
            display: none; z-index: 100; pointer-events: none;
        }

        /* ================= บอสไฟต์ ================= */
        #quiz-container {
            background: rgba(255,255,255,0.95); border: 6px solid #4a2e15; border-radius: 20px;
            padding: 20px; width: 90%; max-width: 500px; text-align: center; display: none; z-index: 300;
            max-height: 90vh; overflow-y: auto;
        }
        
        .quiz-header {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 16px; color: #4a2e15; font-weight: bold; margin-bottom: 15px;
            border-bottom: 3px solid #4a2e15; padding-bottom: 10px;
        }

        .difficulty-badge {
            display: inline-block; padding: 5px 12px; border-radius: 20px;
            font-size: 12px; font-weight: bold; margin-left: 10px;
        }
        .difficulty-easy { background: #4caf50; color: white; }
        .difficulty-medium { background: #ff9800; color: white; }
        .difficulty-hard { background: #f44336; color: white; }

        .combo-display {
            position: absolute; top: 60px; right: 15px; background: #ff6f00;
            color: white; padding: 8px 15px; border-radius: 20px; font-weight: bold;
            font-size: 18px; z-index: 501; display: none;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        #boss-sprite {
            width: 110px; height: 110px; margin: -55px auto 10px auto; 
            background: var(--boss-mask) center/contain no-repeat;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5));
            animation: bossHover 2s infinite alternate; transition: 0.3s;
        }
        @keyframes bossHover { 0% { transform: translateY(0); } 100% { transform: translateY(-10px); } }
        
        .boss-hit { filter: drop-shadow(0 0 15px red) brightness(0.7) sepia(1) hue-rotate(-50deg) saturate(5) !important; transform: scale(0.9); }

        .quiz-question { font-size: 26px; color: #d32f2f; font-weight: 900; margin-bottom: 15px; }
        
        /* ================= รูปภาพคำถาม ================= */
        .quiz-img-display {
            width: 180px; height: 180px; object-fit: contain; margin: 0 auto 15px auto;
            border-radius: 15px; border: 3px solid #4a2e15; padding: 10px;
            display: none; background: #f5f5f5; box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .quiz-btn {
            display: block; width: 100%; background: #4caf50; border: 4px solid #1b5e20;
            color: white; font-size: 20px; font-weight: bold; padding: 10px; border-radius: 15px;
            margin-bottom: 10px; cursor: pointer; box-shadow: 0 5px 0 #1b5e20; transition: 0.1s;
        }
        .quiz-btn:active { transform: translateY(5px); box-shadow: 0 0 0 #1b5e20; }
        .quiz-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* ================= Hint Button ================= */
        .hint-btn {
            background: #2196f3; border: 3px solid #0d47a1; color: white;
            padding: 8px 15px; border-radius: 10px; font-weight: bold;
            cursor: pointer; margin-bottom: 10px; width: 100%;
            box-shadow: 0 3px 0 #0d47a1; transition: 0.1s;
        }
        .hint-btn:active { transform: translateY(3px); box-shadow: 0 0 0 #0d47a1; }
        .hint-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .hint-text {
            background: #fff9c4; border-left: 4px solid #fbc02d;
            padding: 10px; margin-bottom: 10px; border-radius: 5px;
            color: #f57f17; font-weight: bold; display: none; font-size: 14px;
        }

        /* ================= Achievement ================= */
        .achievement-popup {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            border: 4px solid #ff6f00; border-radius: 15px; padding: 15px 25px;
            color: #333; font-weight: bold; font-size: 18px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.4);
            z-index: 5000; display: none; animation: slideUp 0.5s ease-out;
        }
        @keyframes slideUp {
            from { transform: translateX(-50%) translateY(100px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }

        /* ================= Power-ups ================= */
        .powerup {
            position: absolute; width: 50px; height: 50px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 30px; cursor: pointer; z-index: 150; box-shadow: 0 4px 8px rgba(0,0,0,0.4);
            animation: floatPowerup 2s infinite ease-in-out;
            border: 3px solid white;
        }
        .powerup-2x { background: linear-gradient(135deg, #ff9800, #ffb74d); } /* Double Points */
        .powerup-shield { background: linear-gradient(135deg, #2196f3, #64b5f6); } /* Shield */
        .powerup-slow { background: linear-gradient(135deg, #9c27b0, #ce93d8); } /* Slow Motion */

        @keyframes floatPowerup {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(10deg); }
        }

        /* ================= Confetti ================= */
        .confetti {
            position: fixed; pointer-events: none; z-index: 9998;
            animation: confettiFall 3s ease-out forwards;
        }
        @keyframes confettiFall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        /* ================= Streak Indicator ================= */
        .streak-badge {
            position: absolute; top: 70px; right: 15px; z-index: 1900;
            background: linear-gradient(135deg, #ff6f00, #ff9100);
            color: white; padding: 10px 20px; border-radius: 25px;
            font-weight: bold; font-size: 16px; box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            display: none; animation: pulse 0.5s ease-out;
        }
        @keyframes pulse {
            0% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* ================= Time Bonus Bar ================= */
        .time-bonus-bar {
            position: absolute; bottom: 55px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 300px; height: 8px; background: rgba(0,0,0,0.5);
            border: 2px solid #ffeb3b; border-radius: 5px; overflow: hidden; display: none; z-index: 100;
        }
        .time-bonus-fill {
            height: 100%; background: linear-gradient(90deg, #ffeb3b, #ff9800);
            transition: width 0.5s ease;
        }

        /* ================= Star Rating Display ================= */
        .star-rating {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 80px; z-index: 6000; animation: starPop 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        @keyframes starPop {
            0% { transform: translate(-50%, -50%) scale(0) rotate(0deg); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <audio id="sfx-click" src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg" preload="auto"></audio>
    <audio id="sfx-chest" src="https://actions.google.com/sounds/v1/alarms/spaceship_alarm.ogg" preload="auto"></audio> 
    <audio id="sfx-correct" src="https://actions.google.com/sounds/v1/cartoon/cartoon_cowbell.ogg" preload="auto"></audio>
    <audio id="sfx-wrong" src="https://actions.google.com/sounds/v1/cartoon/slip_and_fall.ogg" preload="auto"></audio>
    <audio id="sfx-drop" src="https://actions.google.com/sounds/v1/cartoon/pop.ogg" preload="auto"></audio>
    <audio id="sfx-achievement" src="https://actions.google.com/sounds/v1/cartoon/cartoon_boing.ogg" preload="auto"></audio>
    
    <audio id="bgm-m1" src="https://mp3tourl.com/audio/1779823159138-3ce05243-a30b-4196-855b-f6a73d8ad7ab.mp3" loop preload="auto"></audio>
    <audio id="bgm-m2" src="https://mp3tourl.com/audio/1779823741006-10020f71-6fa5-4555-8789-80bdec86c0ec.mp3" loop preload="auto"></audio>
    <audio id="bgm-m3" src="https://mp3tourl.com/audio/1779824125833-193b9958-8213-4afa-bbb5-712dbda98016.mp3" loop preload="auto"></audio>

    <div class="top-btn" id="home-btn" onclick="location.reload()">🏠</div>
    <div class="top-btn" id="music-btn" onclick="toggleMusic()">🎵</div>
    <div class="manual-link" onclick="showManual()">📖</div>

    <div id="powerup-container" style="position: fixed; top: 80px; right: 15px; display: none; z-index: 1900; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 10px; color: white; font-weight: bold; font-size: 14px; text-align: center; border: 2px solid #ffca28;"></div>

    <div id="scene-title" class="scene active">
        <div class="firefly" style="top: 20%; left: 30%; animation-duration: 3s;"></div>
        <div class="firefly" style="top: 50%; left: 70%; animation-duration: 4s;"></div>
        <div class="firefly" style="top: 70%; left: 20%; animation-duration: 2.5s;"></div>

        <div class="wood-panel">
            <h1 class="game-title">ตะลุยป่าไตรยางศ์</h1>
            <input type="text" id="input-name" placeholder="ชื่อนักสำรวจ..." autocomplete="off">
            <button class="wood-btn" onclick="goToCharSelect()">▶ เริ่มการผจญภัย</button>
        </div>
    </div>

    <div id="scene-char" class="scene">
        <div class="wood-panel">
            <h2 style="margin:0 0 20px 0; color:#fff; text-shadow:2px 2px #4a2e15; font-size: 24px;">เลือกคู่หูของคุณ</h2>
            <div style="display: flex; gap: 20px; justify-content: center;">
                <div class="char-box" onclick="enterMap('boy')">
                    <div class="char-model-select" style="background-image: var(--char-boy);"></div>
                    <h3 style="margin:10px 0 0 0; color:#fff;">ชาย</h3>
                </div>
                <div class="char-box" onclick="enterMap('girl')">
                    <div class="char-model-select" style="background-image: var(--char-girl);"></div>
                    <h3 style="margin:10px 0 0 0; color:#fff;">หญิง</h3>
                </div>
            </div>
        </div>
    </div>

    <div id="scene-map" class="scene">
        <svg id="svg-path" viewBox="0 0 100 100" preserveAspectRatio="none">
            <polyline id="svg-line" points="" fill="none" stroke="white" stroke-width="1.5" stroke-dasharray="3,3" />
        </svg>

        <div class="map-node" id="node-0"><div class="node-img" style="background-image: var(--icon-school);"></div><div class="node-label">จุดเริ่มต้น</div></div>
        <div class="map-node" id="node-1"><div class="node-img" style="background-image: var(--icon-forest);"></div><div class="node-label">1. ป่าดงดิบ</div></div>
        <div class="map-node" id="node-2"><div class="node-img" style="background-image: var(--icon-cave);"></div><div class="node-label">2. ถ้ำลึกลับ</div></div>
        <div class="map-node" id="node-3"><div class="node-img" style="background-image: var(--icon-camp);"></div><div class="node-label">3. ค่ายริมน้ำ</div></div>
        <div class="map-node" id="node-4"><div class="node-img" style="background-image: var(--icon-temple);"></div><div class="node-label">4. วิหารโบราณ</div></div>

        <div id="map-avatar"></div>

        <div id="dialogue-popup">
            <div id="dialogue-text">...</div>
            <div class="dialogue-next" onclick="nextDialogue()">▶ แตะเพื่อไปต่อ</div>
            <div class="dialogue-arrow"></div>
        </div>
    </div>

    <div id="scene-game" class="scene">
        <div id="game-chest" onclick="openChest()"></div>
        <div class="hud" id="game-hud">

        // ================= Power-ups System =================
        function spawnPowerup() {
            if(Math.random() > 0.15) return; // 15% chance
            
            let types = [
                { icon: '2️⃣', type: '2x', name: '2x คะแนน', duration: 8 },
                { icon: '🛡️', type: 'shield', name: 'Shield', duration: 10 },
                { icon: '⏱️', type: 'slow', name: 'Slow Motion', duration: 6 }
            ];
            
            let chosen = types[Math.floor(Math.random() * types.length)];
            let powerup = document.createElement('div');
            powerup.className = 'powerup powerup-' + chosen.type;
            powerup.innerText = chosen.icon;
            powerup.style.left = Math.floor(Math.random() * 80) + 10 + '%';
            powerup.style.top = '-50px';
            
            document.getElementById('game-area').appendChild(powerup);
            
            let pos = -50;
            let fallSpeed = window.innerHeight / 250;
            
            let fall = setInterval(() => {
                pos += fallSpeed;
                powerup.style.top = pos + 'px';
                if(pos > window.innerHeight) {
                    clearInterval(fall); powerup.remove();
                }
            }, 20);

            powerup.onclick = function(e) {
                e.stopPropagation();
                clearInterval(fall);
                activatePowerup(chosen.type, chosen.name, chosen.duration);
                this.remove();
                playSfx('sfx-correct');
                createConfetti(20);
            };
        }

        function activatePowerup(type, name, duration) {
            if(activePowerups[type]) return;
            
            activePowerups[type] = true;
            
            if(type === '2x') scoreMultiplier = 2;
            else if(type === 'shield') {
                // Shield absorbs 1 wrong answer
            } else if(type === 'slow') {
                // Slow down falling items
                document.querySelectorAll('.game-item').forEach(item => {
                    item.style.animationPlayState = 'paused';
                });
            }

            let popup = document.getElementById('powerup-container');
            popup.style.display = 'block';
            popup.innerText = `✨ ${name} (${duration}s)`;
            
            setTimeout(() => {
                activePowerups[type] = false;
                scoreMultiplier = 1;
                if(type === 'slow') {
                    document.querySelectorAll('.game-item').forEach(item => {
                        item.style.animationPlayState = 'running';
                    });
                }
                popup.style.display = 'none';
            }, duration * 1000);
        }

        // ================= Time Bonus System =================
        function updateTimeBonus(timeLeft) {
            if(timeLeft > 150) timeBonus = 5;
            else if(timeLeft > 120) timeBonus = 4;
            else if(timeLeft > 90) timeBonus = 3;
            else if(timeLeft > 60) timeBonus = 2;
            else if(timeLeft > 30) timeBonus = 1;
            else timeBonus = 0;
            
            let bonusBar = document.getElementById('time-bonus-bar');
            if(bonusBar) {
                let fillPercent = Math.max(0, (timeLeft / 180) * 100);
                document.getElementById('time-bonus-fill').style.width = fillPercent + '%';
            }
        }

        // ================= Difficulty Multiplier =================
        function calculateDifficultyBonus(difficulty) {
            if(difficulty === 'easy') return 1;
            if(difficulty === 'medium') return 1.5;
            if(difficulty === 'hard') return 2;
            return 1;
        }

            el.style.top = y + 'px';
            el.style.color = color;
            el.style.fontSize = '40px';
            el.style.fontWeight = '900';
            el.style.textShadow = '2px 2px 0 #000, -1px -1px 0 #fff';
            el.style.pointerEvents = 'none';
            el.style.zIndex = '9999';
            el.style.transition = 'all 0.8s ease-out';
            document.body.appendChild(el);
            
            void el.offsetWidth;
            
            el.style.top = (y - 80) + 'px';
            el.style.opacity = '0';
            
            setTimeout(() => el.remove(), 800);
        }

        function nextDialogue() {
            playSfx('sfx-click');

            document.getElementById('dialogue-text').innerHTML = dialogueStack.shift();

            if(!isMuted) { sfxChest.currentTime = 0; sfxChest.play(); }
            
            let chest = document.getElementById('game-chest');
            chest.style.backgroundImage = 'var(--chest-open)';
            
            setTimeout(() => {
                chest.style.display = 'none';
                let mapMsg = "";
                if(storyProgress === 1) mapMsg = "ไก่ จิก เด็ก ตาย (เด็ก ตาย) บน ปาก โอ่ง<br><span style='color:red;'>(หาอักษรกลาง 20 ตัว)</span>";
                if(storyProgress === 2) mapMsg = "ผี ฝาก ถุง ข้าว สาร ให้ ฉัน ฐาน ฃวด<br><span style='color:red;'>(ใส่อักษรสูงลงตะกร้า 20 ตัว)</span>";
                if(storyProgress === 3) mapMsg = "งู ใหญ่ นอน อยู่ ณ ริม วัด โม ฬี โลก<br><span style='color:red;'>(หาอักษรต่ำเดี่ยว 20 ตัว)</span>";
                if(storyProgress === 4) mapMsg = "พ่อ ค้า ฟัน ทอง ซื้อ ช้าง ฮูก<br><span style='color:red;'>(ใส่อักษรต่ำคู่ลงตะกร้า 20 ตัว)</span>";
                if(storyProgress === 5) mapMsg = "ตอบคำถาม 30 ข้อ 5 นาที!";

                Swal.fire({
                    title: 'ลายแทงสมบัติ!', html: mapMsg,
                    imageUrl: 'https://cdn-icons-png.flaticon.com/512/7517/7517228.png', imageWidth: 150,
                    confirmButtonText: 'ลุยเลย!', confirmButtonColor: '#8b5a2b', background: '#fff8e1', allowOutsideClick: false
                }).then(() => {
                    sfxChest.pause(); sfxChest.currentTime = 0; 
                    
                    if(!isMuted) {
                        if(storyProgress === 1) document.getElementById('bgm-m1').play();
                        if(storyProgress === 2) document.getElementById('bgm-m2').play();
                        if(storyProgress === 3 || storyProgress === 4) document.getElementById('bgm-m3').play();
                    }
                    
                    if(storyProgress === 5) startBossGame(); else startGame();
                });
            }, 1000);
        }

        // ================= มินิเกม 1-4 =================
        function startGame() {
            document.getElementById('game-hud').style.display = 'flex';
            document.getElementById('progress-bar').style.display = 'block';
            
            let timeBonus = document.createElement('div');
            timeBonus.id = 'time-bonus-bar';
            timeBonus.className = 'time-bonus-bar';
            timeBonus.style.display = 'block';
            timeBonus.innerHTML = '<div class="time-bonus-fill" id="time-bonus-fill"></div>';
            document.getElementById('scene-game').appendChild(timeBonus);

            let isBasket = (storyProgress === 2 || storyProgress === 4);
            if(isBasket) document.getElementById('basket').style.display = 'block';

            let timeLeft = 180; 
            currentScore = 0; itemsSpawned = 0;
            scoreMultiplier = 1;
            activePowerups = { '2x': false, 'shield': false, 'slow': false };
            document.getElementById('score').innerText = currentScore + "/20";
            document.getElementById('timer').innerText = timeLeft;

            gameTimer = setInterval(() => {
                timeLeft--; 
                document.getElementById('timer').innerText = timeLeft;
                updateTimeBonus(timeLeft);
                if(timeLeft <= 0) endGame(false);
            }, 1000);

            spawnInterval = setInterval(() => {
                spawnItem();
                spawnPowerup();
            }, 1500); 
        }

        function updateProgressBar() {
            let progress = (currentScore / 20) * 100;
            document.getElementById('progress-fill').style.width = progress + '%';
            document.getElementById('progress-fill').innerText = Math.round(progress) + '%';
        }

        function spawnItem() {
            if(itemsSpawned >= 20) return; 
            itemsSpawned++;

            let targetArr = storyProgress === 1 ? midCons : storyProgress === 2 ? highCons : storyProgress === 3 ? lowSingle : lowDouble;
            let isTarget = Math.random() > 0.5; 
            let distractorArr = allCons.filter(c => !targetArr.includes(c)); 
            let char = isTarget ? targetArr[Math.floor(Math.random()*targetArr.length)] : distractorArr[Math.floor(Math.random()*distractorArr.length)];
            
            let item = document.createElement('div');
            item.className = 'game-item'; item.innerText = char;
            item.style.left = Math.floor(Math.random() * 80) + 10 + '%';
            item.style.top = '-100px';
            
            document.getElementById('game-area').appendChild(item);
            
            let pos = -100;
            let fallSpeed = window.innerHeight / 200; 
            
            let fall = setInterval(() => {
                pos += fallSpeed;
                item.style.top = pos + 'px';
                if(pos > window.innerHeight) {
                    clearInterval(fall); item.remove();
                    if(itemsSpawned >= 20 && document.getElementById('game-area').childElementCount === 0) checkWinCondition();
                }
            }, 20);

            let isBasket = (storyProgress === 2 || storyProgress === 4);

            item.onpointerdown = function(e) {
                e.preventDefault(); clearInterval(fall);
                
                if(targetArr.includes(this.innerText)) {
                    let pointGain = 1 * scoreMultiplier;
                    currentScore += pointGain; 
                    comboCount++;
                    if(comboCount > maxCombo) maxCombo = comboCount;
                    
                    document.getElementById('score').innerText = currentScore + "/20";
                    updateProgressBar();
                    showFloatingText("+" + pointGain, e.clientX, e.clientY, "#8bc34a");
                    
                    if(comboCount >= 5) {
                        document.getElementById('combo-display').style.display = 'block';
                        document.getElementById('combo-count').innerText = comboCount;
                        showAchievement('🔥 Combo x' + comboCount + '!');
                    }
                    
                    if(scoreMultiplier === 2) {
                        showAchievement('2️⃣ Double Points!');
                    }
                    
                    if(isBasket) {
                        playSfx('sfx-drop');
                        let basket = document.getElementById('basket').getBoundingClientRect();
                        this.style.transition = "all 0.5s ease";
                        this.style.top = basket.top + "px";
                        this.style.left = (basket.left + 35) + "px";
                        this.style.transform = "scale(0)";
                    } else {
                        playSfx('sfx-correct');
                        this.style.background = "#8bc34a"; this.style.color = "#fff";
                        this.style.transform = "scale(0)";
                    }
                } else {
                    if(activePowerups.shield) {
                        activePowerups.shield = false;
                        showAchievement('🛡️ Shield Saved You!');
                        this.style.background = "#ffc107"; this.style.color = "#000";
                    } else {
                        comboCount = 0;
                        document.getElementById('combo-display').style.display = 'none';
                        playSfx('sfx-wrong'); 
                        showFloatingText("❌", e.clientX, e.clientY, "#f44336");
                        this.style.background = "#d32f2f"; this.style.color = "#fff";
                    }
                    this.style.transform = "scale(0)";
                }

                setTimeout(() => { 
                    this.remove(); 
                    if(itemsSpawned >= 20 && document.getElementById('game-area').childElementCount === 0) checkWinCondition();
                }, 500);
            };
        }

        function checkWinCondition() { if(currentScore >= 10) endGame(true); else endGame(false); }

        function getRewardData(score) {
            if (score >= 16) return { stars: "⭐⭐⭐", d: 5 };
            if (score >= 11) return { stars: "⭐⭐", d: 4 };
            if (score >= 10) return { stars: "⭐", d: 3 };
            return { stars: "", d: 0 };
        }

        function endGame(isWin) {
            clearInterval(gameTimer); clearInterval(spawnInterval);
            document.getElementById('game-area').innerHTML = "";
            document.getElementById('game-hud').style.display = 'none';
            document.getElementById('progress-bar').style.display = 'none';
            document.getElementById('combo-display').style.display = 'none';
            document.getElementById('basket').style.display = 'none';
            
            let timeBonus = document.getElementById('time-bonus-bar');
            if(timeBonus) timeBonus.remove();
            
            stopAllBgm();
            
            if(isWin) {
                let reward = getRewardData(currentScore);
                totalDiamonds += reward.d;
                
                if(reward.d > 0) createConfetti(50);
                showStarRating(currentScore >= 16 ? 3 : currentScore >= 11 ? 2 : 1);
                
                if(storyProgress===1) scoresData.m1 = currentScore;
                if(storyProgress===2) scoresData.m2 = currentScore;
                if(storyProgress===3) scoresData.m31 = currentScore;
                if(storyProgress===4) scoresData.m32 = currentScore;

                sendDataToSheet();

                let nextMsg = storyProgress === 3 ? "เตรียมตัวลุย อักษรต่ำคู่ ต่อเลย!" : "ไปด่านต่อไปกันเลย!";
                Swal.fire({ title: `ผ่านด่าน!`, text: `ได้ ${currentScore}/20 คะแนน ${reward.stars}\n\n${nextMsg}`, icon: "success", confirmButtonColor: '#8b5a2b', allowOutsideClick: false })
                .then(() => { 
                    if(storyProgress===0) { storyProgress = 1; } else { storyProgress++; } 
                    switchScene('scene-map'); resumeStory(); 
                });
            } else {
                Swal.fire({ title: "ไม่ผ่านด่าน!", text: `ได้ ${currentScore} คะแนน (ต้อง 10 ขึ้นไป)\nลองใหม่สู้ๆ!`, icon: "error", confirmButtonColor: '#d32f2f', allowOutsideClick: false })
                .then(() => { switchScene('scene-map'); resumeStory(); }); 
            }
        }

        // ================= บอสไฟต์ 30 ข้อ =================
        function startBossGame() {
            document.getElementById('game-hud').style.display = 'flex';
            document.getElementById('combo-display').style.display = 'block';
            document.getElementById('quiz-container').style.display = 'block';
            let timeLeft = 300; 
            currentScore = 0; quizIndex = 0; comboCount = 0;
            scoreMultiplier = 1;
            activePowerups = { '2x': false, 'shield': false, 'slow': false };
            document.getElementById('score').innerText = currentScore + "/30";
            document.getElementById('timer').innerText = timeLeft;

            quizData.sort(() => Math.random() - 0.5);

            gameTimer = setInterval(() => {
                timeLeft--; document.getElementById('timer').innerText = timeLeft;
                if(timeLeft <= 0) endBoss();
            }, 1000);
            showQuiz();
        }

        function showQuiz() {
            if(quizIndex >= 30) { endBoss(); return; }
            
            document.getElementById('quiz-current').innerText = quizIndex + 1;
            document.getElementById('quiz-word').innerText = quizData[quizIndex].w;
            document.getElementById('hint-text').style.display = 'none';
            document.getElementById('hint-btn').disabled = false;
            hintUsed = false;
            
            let diffDisplay = document.getElementById('difficulty-display');
            diffDisplay.className = 'difficulty-badge';
            if(quizData[quizIndex].difficulty === 'easy') {
                diffDisplay.classList.add('difficulty-easy');
                diffDisplay.innerText = 'ง่าย';
            } else if(quizData[quizIndex].difficulty === 'medium') {
                diffDisplay.classList.add('difficulty-medium');
                diffDisplay.innerText = 'ปานกลาง';
            } else {
                diffDisplay.classList.add('difficulty-hard');
                diffDisplay.innerText = 'ยาก';
            }
            
            let imgEl = document.getElementById('quiz-img');
            if(quizData[quizIndex].img) {
                imgEl.src = quizData[quizIndex].img;
                imgEl.style.display = 'block';
            } else {
                imgEl.style.display = 'none';
            }
        }

        function showHint() {
            if(hintUsed) return;
            hintUsed = true;
            document.getElementById('hint-text').style.display = 'block';
            document.getElementById('hint-content').innerText = quizData[quizIndex].hint;
            document.getElementById('hint-btn').disabled = true;
        }

        function checkQuiz(ans, event) {
            let boss = document.getElementById('boss-sprite');
            let diffBonus = calculateDifficultyBonus(quizData[quizIndex].difficulty);
            
            if(quizData[quizIndex].a === ans) {
                playSfx('sfx-correct'); 
                let pointGain = Math.round(1 * diffBonus);
                currentScore += pointGain; 
                comboCount++;
                if(comboCount > maxCombo) maxCombo = comboCount;
                
                document.getElementById('score').innerText = currentScore + "/30";
                document.getElementById('combo-count').innerText = comboCount;
                
                boss.classList.add('boss-hit');
                showFloatingText("+" + pointGain, event.clientX, event.clientY, "#8bc34a");
                
                if(comboCount % 5 === 0) {
                    showAchievement('🔥 Combo x' + comboCount + '!');
                    createConfetti(15);
                }
                
                if(quizData[quizIndex].difficulty === 'hard') {
                    showAchievement('💪 ยาก! +' + pointGain + ' โบนัส');
                }
                
                setTimeout(() => boss.classList.remove('boss-hit'), 300);
            } else { 
                comboCount = 0;
                playSfx('sfx-wrong'); 
                showFloatingText("❌", event.clientX, event.clientY, "#f44336");
                let container = document.getElementById('quiz-container');
                container.style.transform = "translateX(-10px)";
                setTimeout(() => container.style.transform = "translateX(10px)", 50);
                setTimeout(() => container.style.transform = "translateX(0)", 100);
            }
            quizIndex++; showQuiz();
        }

        function showAchievement(text) {
            playSfx('sfx-achievement');
            let popup = document.getElementById('achievement-popup');
            popup.innerText = text;
            popup.style.display = 'block';
            setTimeout(() => { popup.style.display = 'none'; }, 2000);
        }

        function endBoss() {
            clearInterval(gameTimer);
            document.getElementById('quiz-container').style.display = 'none';
            document.getElementById('game-hud').style.display = 'none';
            document.getElementById('combo-display').style.display = 'none';
            stopAllBgm();

            if(currentScore >= 10) {
                let bossRatio = currentScore / 30;
                let bD = 0;
                if(bossRatio >= 0.8) bD = 15;
                else if (bossRatio >= 0.55) bD = 10;
                else bD = 5;
                totalDiamonds += bD;
                scoresData.m4 = currentScore;
                
                createConfetti(60);
                showStarRating(bossRatio >= 0.8 ? 3 : bossRatio >= 0.55 ? 2 : 1);
                
                sendDataToSheet();

                let finalStars = "";
                let finalMsg = "";
                if(totalDiamonds >= 28) { finalStars = "⭐⭐⭐ PERFECT!"; finalMsg = "ได้รับคะแนนเต็ม + ของรางวัล!"; } 
                else if(totalDiamonds >= 19) { finalStars = "⭐⭐ EXCELLENT"; finalMsg = "ได้รับคะแนนครึ่งหนึ่ง + ของรางวัล!"; } 
                else { finalStars = "⭐ GREAT"; finalMsg = "ได้รับแค่คะแนน (ไม่มีของรางวัล)"; }

                Swal.fire({
                    title: "🏆 ยินดีด้วย คุณพิชิตป่าสำเร็จ!", 
                    html: `<span style='font-size:35px;'>${finalStars}</span><br><br><b style="color:#ff6f00; font-size:18px;">${finalMsg}</b><br><br><span style="font-size:20px;">📊 คะแนนรวมทั้งหมด <b>${totalDiamonds}/35</b> เพชร 💎</span><br><span style="color:#ff6f00; font-size:16px;">🔥 Combo สูงสุด: <b>x${maxCombo}</b></span><br><span style="color:#2196f3; font-size:16px;">📈 คะแนนบอสไฟต์: <b>${currentScore}/30</b></span>`,
                    imageUrl: 'https://cdn-icons-png.flaticon.com/512/4230/4230571.png', imageWidth: 150, 
                    confirmButtonText: '🎓 รับใบประกาศกับคุณครู!', confirmButtonColor: '#8bc34a', background: '#fff8e1', allowOutsideClick: false
                }).then(() => { location.reload(); });
            } else {
                Swal.fire({ title: "⚔️ ยังไม่ชนะบอส!", text: "ต้องถูกอย่างน้อย 10 ข้อ ลองใหม่นะ!", icon: "error", allowOutsideClick: false })
                .then(() => { startBossGame(); });
            }
        }

        function sendDataToSheet() {
            const payload = {
                studentName: playerName,
                scoreLvl1: scoresData.m1,
                scoreLvl2: scoresData.m2,
                scoreLvl3: scoresData.m31 + scoresData.m32, 
                scoreBoss: scoresData.m4,
                totalScore: totalDiamonds 
            };

            fetch(sheetUrl, { 
                method: 'POST', 
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }, 
                body: JSON.stringify(payload)
            }).then(res => console.log("ส่งเข้าชีตสำเร็จ!"))
              .catch(e => console.log(e));
        }
    </script>
</body>
</html>
