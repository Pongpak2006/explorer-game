<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ตะลุยป่า ไตรยางศ์</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root {
            /* 1. รูปพื้นหลัง */
            --bg-start: url('https://img.magnific.com/free-vector/forest-scene-with-various-forest-trees_1308-57640.jpg?semt=ais_hybrid&w=740&q=80');
            
            /* 2. รูปตัวละคร (แนะนำ PNG โปร่งใส ขนาด 300x300 px) */
            --char-boy: url('https://i.postimg.cc/mrSpgYMf/2.png');
            --char-girl: url('https://i.postimg.cc/TYysJW8r/1.png');
            
            /* 3. รูปไอคอนด่านต่างๆ (แนะนำ PNG โปร่งใส ขนาด 200x200 px) */
            --icon-school: url('https://i.postimg.cc/q7gCZn0d/1.png'); /* โรงเรียน */
            --icon-forest: url('https://i.postimg.cc/zGGLVWyN/2.png'); /* ป่า */
            --icon-cave: url('https://i.postimg.cc/g2txRJhM/3.png'); /* ถ้ำ */
            --icon-camp: url('https://i.postimg.cc/8CFjbSBD/4.png'); /* ค่าย */
            --icon-temple: url('https://i.postimg.cc/Bb3bsPrk/5.png'); /* วิหาร */
            
            /* รูปหีบสมบัติ */
            --chest-closed: url('https://cdn-icons-png.flaticon.com/512/4230/4230569.png');
            --chest-open: url('https://cdn-icons-png.flaticon.com/512/4230/4230571.png');
        }

        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Sarabun', sans-serif;
            background-color: #000; color: white; user-select: none; touch-action: none;
        }

        .scene {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            background-image: var(--bg-start);
        }
        .scene.active { display: flex; }

        /* ================= UI หน้าแรก ================= */
        .wood-panel {
            background: #a1662f; border: 8px solid #4a2e15; border-radius: 20px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5), 0 15px 25px rgba(0,0,0,0.8);
            padding: 30px; text-align: center; width: 85%; max-width: 500px; z-index: 100;
        }

        .game-title {
            white-space: nowrap; /* บังคับให้อยู่บรรทัดเดียวแน่นอน */
            font-size: clamp(30px, 6vw, 60px); 
            color: #ffca28; text-shadow: 3px 3px 0 #4a2e15, 0 0 10px #000;
            margin: 0 0 20px 0; font-weight: 900;
        }

        #input-name {
            padding: 12px; font-size: 22px; border-radius: 10px; border: 4px solid #5c3a21;
            text-align: center; margin-bottom: 20px; width: 80%; font-family: 'Sarabun';
            background: #fff8e1; color: #4a2e15; font-weight: bold; outline: none;
        }

        .wood-btn {
            background: linear-gradient(to bottom, #d49a57, #8b5a2b);
            border: 4px solid #4a2e15; border-radius: 15px; color: #fff;
            font-size: 24px; font-weight: 900; padding: 12px 30px; cursor: pointer;
            box-shadow: 0 6px 0 #4a2e15, 0 10px 10px rgba(0,0,0,0.5); transition: 0.1s;
        }
        .wood-btn:active { transform: translateY(6px); box-shadow: 0 0 0 #4a2e15; }

        /* ปุ่ม Home กลับหน้าแรก */
        .home-btn {
            position: absolute; top: 15px; left: 15px; z-index: 2000;
            background: #fff; border: 4px solid #d32f2f; border-radius: 50%;
            width: 50px; height: 50px; display: none; justify-content: center; align-items: center;
            font-size: 24px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }
        .home-btn:active { transform: scale(0.9); }

        /* ================= ตัวละคร ================= */
        .char-model {
            width: 120px; height: 120px; background-size: contain; background-repeat: no-repeat; background-position: center;
            animation: breathe 1.5s infinite ease-in-out; filter: drop-shadow(0px 10px 5px rgba(0,0,0,0.5));
        }
        @keyframes breathe { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-8px) scale(1.02); } }

        .char-box {
            background: rgba(255,255,255,0.2); border: 4px solid transparent;
            border-radius: 20px; padding: 10px; cursor: pointer; transition: 0.2s;
        }
        .char-box:active { background: rgba(255,255,255,0.5); border: 4px solid #ffca28; }

        /* ================= แผนที่: เส้นทาง & ไอคอน (แก้สมบูรณ์ 100%) ================= */
        #map-path { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        
        .map-node {
            position: absolute; display: flex; flex-direction: column; align-items: center;
            transform: translate(-50%, -50%); /* จัดกึ่งกลางจุดเป๊ะๆ */
            z-index: 20; filter: drop-shadow(0 6px 6px rgba(0,0,0,0.6));
            animation: bounceNode 2s infinite ease-in-out;
        }
        @keyframes bounceNode { 0%, 100% { margin-top: 0; } 50% { margin-top: -10px; } }

        .node-img { width: 80px; height: 80px; background-size: contain; background-repeat: no-repeat; background-position: center; }
        .node-label {
            background: #fff; color: #4a2e15; border: 3px solid #4a2e15; padding: 3px 15px;
            border-radius: 15px; font-weight: 900; font-size: 16px; margin-top: 5px; white-space: nowrap;
        }

        #map-avatar { 
            position: absolute; z-index: 50; transition: all 1.5s ease-in-out; 
            transform: translate(-50%, -50%); margin-top: -30px; /* ให้ตัวละครยืนทับบนไอคอนพอดี */
            top: -20%; left: -20%; 
        }

        /* ================= กล่องนำทาง (ข้างๆ ตัวละคร) ================= */
        #dialogue-popup {
            position: absolute; background: #fff8e1; border: 5px solid #8b3a0f; border-radius: 20px;
            padding: 20px; color: #333; font-size: 20px; font-weight: bold; text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.6); z-index: 1000; display: none; width: 280px; 
            transform: translate(-50%, -100%); margin-top: -60px;
        }
        .dialogue-arrow {
            content: ''; position: absolute; bottom: -15px; left: 50%; transform: translateX(-50%);
            border-width: 15px 15px 0; border-style: solid; border-color: #8b3a0f transparent transparent transparent;
        }

        /* ================= มินิเกม & หีบ ================= */
        #game-chest {
            width: 220px; height: 220px; background-image: var(--chest-closed);
            background-size: contain; background-repeat: no-repeat; background-position: center;
            cursor: pointer; z-index: 200; display: none; animation: floatChest 2s infinite ease-in-out;
            filter: drop-shadow(0 15px 15px rgba(0,0,0,0.8));
        }
        @keyframes floatChest { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        .game-item {
            position: absolute; width: 90px; height: 90px; background: #fff; border: 5px solid #4a2e15; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; font-size: 45px; font-weight: 900; color: #111; cursor: pointer;
            box-shadow: 0 8px 0 #4a2e15; pointer-events: auto; transform: scale(0); transition: transform 0.2s;
        }
        .game-item:active { transform: scale(0.9) translateY(8px); box-shadow: 0 0 0 #4a2e15; }

        .hud {
            position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.8);
            padding: 10px 20px; border-radius: 20px; display: none; gap: 20px; font-size: 26px; font-weight: 900; z-index: 500;
        }

        /* ================= บอสไฟต์ (ด่าน 4) ================= */
        #quiz-container {
            background: rgba(255,255,255,0.95); border: 8px solid #4a2e15; border-radius: 20px;
            padding: 30px; width: 90%; max-width: 500px; text-align: center; display: none; z-index: 300;
        }
        .quiz-question { font-size: 35px; color: #d32f2f; font-weight: 900; margin-bottom: 25px; }
        .quiz-btn {
            display: block; width: 100%; background: #4caf50; border: 4px solid #1b5e20;
            color: white; font-size: 24px; font-weight: bold; padding: 15px; border-radius: 15px;
            margin-bottom: 15px; cursor: pointer; box-shadow: 0 6px 0 #1b5e20; transition: 0.1s;
        }
        .quiz-btn:active { transform: translateY(6px); box-shadow: 0 0 0 #1b5e20; }
    </style>
</head>
<body>

    <audio id="sfx-click" src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg" preload="auto"></audio>
    <audio id="sfx-magic" src="https://actions.google.com/sounds/v1/magic/fairy_glissando.ogg" preload="auto"></audio>
    <audio id="sfx-correct" src="https://actions.google.com/sounds/v1/cartoon/cartoon_cowbell.ogg" preload="auto"></audio>
    <audio id="sfx-wrong" src="https://actions.google.com/sounds/v1/cartoon/slip_and_fall.ogg" preload="auto"></audio>
    <audio id="bg-music" src="https://actions.google.com/sounds/v1/water/waves_crashing_on_rock_beach.ogg" loop preload="auto"></audio>

    <div class="home-btn" id="home-btn" onclick="location.reload()">🏠</div>

    <div id="scene-title" class="scene active">
        <div class="wood-panel">
            <h1 class="game-title">ตะลุยป่าไตรยางศ์</h1>
            <input type="text" id="input-name" placeholder="ชื่อนักสำรวจ...">
            <br>
            <button class="wood-btn" onclick="goToCharSelect()">เริ่มการผจญภัย</button>
        </div>
    </div>

    <div id="scene-char" class="scene">
        <div class="wood-panel">
            <h2 style="margin:0 0 20px 0; color:#fff; text-shadow:2px 2px #4a2e15;">เลือกคู่หูของคุณ</h2>
            <div style="display: flex; gap: 20px; justify-content: center;">
                <div class="char-box" onclick="enterMap('boy')">
                    <div class="char-model" style="background-image: var(--char-boy);"></div>
                    <h3 style="margin:10px 0 0 0; color:#fff;">เด็กชาย</h3>
                </div>
                <div class="char-box" onclick="enterMap('girl')">
                    <div class="char-model" style="background-image: var(--char-girl);"></div>
                    <h3 style="margin:10px 0 0 0; color:#fff;">เด็กหญิง</h3>
                </div>
            </div>
        </div>
    </div>

    <div id="scene-map" class="scene">
        <svg id="map-path">
            <line x1="15%" y1="80%" x2="35%" y2="55%" stroke="white" stroke-width="6" stroke-dasharray="10,10" />
            <line x1="35%" y1="55%" x2="60%" y2="35%" stroke="white" stroke-width="6" stroke-dasharray="10,10" />
            <line x1="60%" y1="35%" x2="80%" y2="60%" stroke="white" stroke-width="6" stroke-dasharray="10,10" />
            <line x1="80%" y1="60%" x2="85%" y2="20%" stroke="white" stroke-width="6" stroke-dasharray="10,10" />
        </svg>

        <div class="map-node" style="top: 80%; left: 15%;" id="node-0">
            <div class="node-img" style="background-image: var(--icon-school);"></div>
            <div class="node-label">จุดเริ่มต้น</div>
        </div>
        <div class="map-node" style="top: 55%; left: 35%;" id="node-1">
            <div class="node-img" style="background-image: var(--icon-forest);"></div>
            <div class="node-label">1. ป่าดงดิบ</div>
        </div>
        <div class="map-node" style="top: 35%; left: 60%;" id="node-2">
            <div class="node-img" style="background-image: var(--icon-cave);"></div>
            <div class="node-label">2. ถ้ำลึกลับ</div>
        </div>
        <div class="map-node" style="top: 60%; left: 80%;" id="node-3">
            <div class="node-img" style="background-image: var(--icon-camp);"></div>
            <div class="node-label">3. ค่ายริมน้ำ</div>
        </div>
        <div class="map-node" style="top: 20%; left: 85%;" id="node-4">
            <div class="node-img" style="background-image: var(--icon-temple);"></div>
            <div class="node-label">4. วิหารโบราณ</div>
        </div>

        <div id="map-avatar" class="char-model"></div>

        <div id="dialogue-popup">
            <div id="dialogue-text">...</div>
            <div class="dialogue-arrow"></div>
            <div style="color: #d32f2f; font-size: 14px; margin-top: 10px; cursor: pointer;" onclick="nextDialogue()">▶ แตะเพื่อไปต่อ</div>
        </div>
    </div>

    <div id="scene-game" class="scene">
        <div id="game-chest" onclick="openChest()"></div>
        <div class="hud" id="game-hud">
            <div style="color: #00e5ff;">💎 <span id="score">0</span></div>
            <div style="color: #ffeb3b;">⏳ <span id="timer">180</span></div>
        </div>
        <div id="game-area" style="width: 100%; height: 100%; position: relative;"></div>
        
        <div id="quiz-container">
            <div class="quiz-question">คำว่า "<span id="quiz-word">ไก่</span>" <br>มีพยัญชนะต้นหมู่อะไร?</div>
            <button class="quiz-btn" onclick="checkQuiz('อักษรกลาง')">อักษรกลาง</button>
            <button class="quiz-btn" style="background: #f44336; border-color: #b71c1c; box-shadow: 0 6px 0 #b71c1c;" onclick="checkQuiz('อักษรสูง')">อักษรสูง</button>
            <button class="quiz-btn" style="background: #2196f3; border-color: #0d47a1; box-shadow: 0 6px 0 #0d47a1;" onclick="checkQuiz('อักษรต่ำ')">อักษรต่ำ</button>
        </div>
    </div>

    <script>
        // ================= ปลดล็อกเสียงอัตโนมัติ =================
        let audioUnlocked = false;
        document.body.addEventListener('pointerdown', function() {
            if(!audioUnlocked) {
                ['sfx-click', 'sfx-magic', 'sfx-correct', 'sfx-wrong', 'bg-music'].forEach(id => {
                    let a = document.getElementById(id);
                    if(a) { a.volume = 0; a.play().catch(e=>{}); a.pause(); a.currentTime = 0; a.volume = 1; }
                });
                audioUnlocked = true;
            }
        }, { once: true });

        function playSfx(id) {
            let sound = document.getElementById(id);
            if(sound) { sound.currentTime = 0; sound.play().catch(e => console.log(e)); }
        }

        // ================= ข้อมูลเกมหลัก =================
        let playerName = "", currentScore = 0, gameTimer, spawnInterval, itemsSpawned = 0;
        let storyProgress = 0; // 0=Start, 1=M1, 2=M2, 3=M3(เดี่ยว), 4=M3(คู่), 5=M4(Boss)
        
        const midConsonants = ['ก','จ','ด','ต','บ','ป','อ'];
        const highConsonants = ['ข','ฉ','ฐ','ถ','ผ','ฝ','ศ','ษ','ส','ห'];
        const lowSingle = ['ง','ญ','น','ย','ณ','ร','ว','ม','ฬ'];
        const lowDouble = ['ค','ฅ','ฆ','ช','ซ','ฌ','ฑ','ฒ','ท','ธ','พ','ฟ','ภ','ฮ'];
        const allConsonants = midConsonants.concat(highConsonants, lowSingle, lowDouble);

        const bossWords = [
            {w:"ไก่", a:"อักษรกลาง"}, {w:"ไข่", a:"อักษรสูง"}, {w:"ควาย", a:"อักษรต่ำ"}, {w:"ช้าง", a:"อักษรต่ำ"}, {w:"เด็ก", a:"อักษรกลาง"},
            {w:"ถุง", a:"อักษรสูง"}, {w:"ปลา", a:"อักษรกลาง"}, {w:"ผึ้ง", a:"อักษรสูง"}, {w:"ม้า", a:"อักษรต่ำ"}, {w:"ยุง", a:"อักษรต่ำ"},
            {w:"ดาว", a:"อักษรกลาง"}, {w:"เสือ", a:"อักษรสูง"}, {w:"เรือ", a:"อักษรต่ำ"}, {w:"นก", a:"อักษรต่ำ"}, {w:"อ่าง", a:"อักษรกลาง"},
            {w:"หมา", a:"อักษรสูง"}, {w:"เต่า", a:"อักษรกลาง"}, {w:"ลิง", a:"อักษรต่ำ"}, {w:"จาน", a:"อักษรกลาง"}, {w:"ฝน", a:"อักษรสูง"},
            {w:"ใบไม้", a:"อักษรกลาง"}, {w:"ศาลา", a:"อักษรสูง"}, {w:"แพ", a:"อักษรต่ำ"}, {w:"งู", a:"อักษรต่ำ"}, {w:"ข้าว", a:"อักษรสูง"},
            {w:"ธง", a:"อักษรต่ำ"}, {w:"บ้าน", a:"อักษรกลาง"}, {w:"เสื้อ", a:"อักษรสูง"}, {w:"แมว", a:"อักษรต่ำ"}, {w:"ปู", a:"อักษรกลาง"}
        ];
        let quizIndex = 0;

        function switchScene(id) {
            document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // 1. กดปุ่มเริ่ม
        function goToCharSelect() {
            playerName = document.getElementById('input-name').value;
            if(!playerName) { alert('พิมพ์ชื่อก่อนน้า!'); return; }
            playSfx('sfx-click');
            document.getElementById('home-btn').style.display = 'flex';
            switchScene('scene-char');
        }

        // 2. เลือกคู่หู
        function enterMap(gender) {
            playSfx('sfx-click');
            let bgm = document.getElementById('bg-music');
            bgm.volume = 0.4; bgm.play().catch(e=>{});

            const avatarUrl = gender === 'boy' ? 'url("https://i.postimg.cc/mrSpgYMf/2.png")' : 'url("https://i.postimg.cc/TYysJW8r/1.png")';
            document.getElementById('map-avatar').style.backgroundImage = avatarUrl;
            
            switchScene('scene-map');
            resumeStory(); // เริ่มการนำทางอัตโนมัติ
        }

        // ================= ระบบนำทางอัตโนมัติ (หัวใจสำคัญ!) =================
        const nodePositions = [
            { id: 0, top: '80%', left: '15%' }, // โรงเรียน
            { id: 1, top: '55%', left: '35%' }, // ป่า (ด่าน 1)
            { id: 2, top: '35%', left: '60%' }, // ถ้ำ (ด่าน 2)
            { id: 3, top: '60%', left: '80%' }, // ค่าย (ด่าน 3)
            { id: 4, top: '20%', left: '85%' }  // วิหาร (บอส)
        ];

        function resumeStory() {
            let avatar = document.getElementById('map-avatar');
            document.getElementById('dialogue-popup').style.display = 'none';

            // ตรวจสอบว่ากำลังอยู่ Story ไหน แล้วเดินไปที่จุดนั้น
            let targetNode = 0;
            if(storyProgress === 0) targetNode = 0;
            else if(storyProgress === 1) targetNode = 1;
            else if(storyProgress === 2) targetNode = 2;
            else if(storyProgress === 3 || storyProgress === 4) targetNode = 3; // ด่าน 3 เล่น 2 รอบ
            else if(storyProgress === 5) targetNode = 4;

            // สั่งตัวละครเดิน
            avatar.style.top = nodePositions[targetNode].top;
            avatar.style.left = nodePositions[targetNode].left;

            // รอ 1.5 วิให้เดินถึง แล้วเปิดบทสนทนา
            setTimeout(() => {
                let msgs = [];
                if(storyProgress === 0) msgs = [`สวัสดี ${playerName}!`, `เราจะเริ่มการผจญภัยจากโรงเรียนนะ`, `เป้าหมายแรกคือ ป่าดงดิบ! ไปกันเลย`];
                if(storyProgress === 1) msgs = [`ถึงป่าดงดิบแล้ว!`, `ภารกิจ "อักษรกลาง" รออยู่ พร้อมไหม?`];
                if(storyProgress === 2) msgs = [`ถึงถ้ำลึกลับแล้ว!`, `ภารกิจ "อักษรสูง" รออยู่ พร้อมไหม?`];
                if(storyProgress === 3) msgs = [`ถึงค่ายริมน้ำ!`, `ภารกิจที่ 3 แบ่ง 2 รอบนะ เริ่มที่ "อักษรต่ำเดี่ยว" ก่อน`];
                if(storyProgress === 4) msgs = [`เยี่ยมมาก!`, `ลุยรอบสอง "อักษรต่ำคู่" ต่อเลย!`];
                if(storyProgress === 5) msgs = [`ถึงวิหารโบราณแล้ว!`, `เตรียมพบกับบอส 30 ข้อ ลุยเลย!`];

                showPopupDialogue(`node-${targetNode}`, msgs, () => {
                    if(storyProgress === 0) {
                        storyProgress = 1; resumeStory(); // คุยจบ เดินไปด่าน 1 ต่อเลย
                    } else {
                        prepareMission(); // คุยจบ เข้าด่าน
                    }
                });
            }, 1500);
        }

        // ระบบกล่องข้อความ
        let dialogueStack = [], dialogueCallback = null;
        function showPopupDialogue(nodeId, list, callback) {
            dialogueStack = list; dialogueCallback = callback;
            let node = document.getElementById(nodeId);
            let popup = document.getElementById('dialogue-popup');
            
            popup.style.top = node.style.top;
            popup.style.left = node.style.left;
            popup.style.display = 'block';
            nextDialogue();
        }

        function nextDialogue() {
            playSfx('sfx-click');
            if(dialogueStack.length === 0) {
                document.getElementById('dialogue-popup').style.display = 'none';
                if(dialogueCallback) dialogueCallback();
                return;
            }
            document.getElementById('dialogue-text').innerText = dialogueStack.shift();
        }

        // เตรียมเข้าด่าน
        function prepareMission() {
            switchScene('scene-game');
            document.getElementById('quiz-container').style.display = 'none';
            let chest = document.getElementById('game-chest');
            chest.style.backgroundImage = 'var(--chest-closed)';
            chest.style.display = 'block';
        }

        // 5. เปิดหีบ
        function openChest() {
            playSfx('sfx-magic');
            let chest = document.getElementById('game-chest');
            chest.style.backgroundImage = 'var(--chest-open)';
            
            setTimeout(() => {
                chest.style.display = 'none';
                let mapMsg = "";
                if(storyProgress === 1) mapMsg = "ไก่ จิก เด็ก ตาย...<br>(หาอักษรกลาง 10 ตัว)";
                if(storyProgress === 2) mapMsg = "ผี ฝาก ถุง ข้าวสาร...<br>(หาอักษรสูง 10 ตัว)";
                if(storyProgress === 3) mapMsg = "งูใหญ่ นอนอยู่...<br>(หาอักษรต่ำเดี่ยว 10 ตัว)";
                if(storyProgress === 4) mapMsg = "พ่อค้า ฟันทอง...<br>(หาอักษรต่ำคู่ 10 ตัว)";
                if(storyProgress === 5) mapMsg = "ตอบคำถาม 30 ข้อ เพื่อปราบวิหาร!";

                Swal.fire({
                    title: 'เจอลายแทงสมบัติ!', html: mapMsg,
                    imageUrl: 'https://cdn-icons-png.flaticon.com/512/7517/7517228.png', imageWidth: 150,
                    confirmButtonText: 'เริ่มเกม!', confirmButtonColor: '#8b5a2b', background: '#fff8e1'
                }).then(() => {
                    if(storyProgress === 5) startBossGame(); else startGame();
                });
            }, 800);
        }

        // ================= มินิเกม 1-4 =================
        function startGame() {
            document.getElementById('game-hud').style.display = 'flex';
            let timeLeft = 180; currentScore = 0; itemsSpawned = 0;
            document.getElementById('score').innerText = currentScore;
            document.getElementById('timer').innerText = timeLeft;

            gameTimer = setInterval(() => {
                timeLeft--; document.getElementById('timer').innerText = timeLeft;
                if(timeLeft <= 0) endGame(false);
            }, 1000);

            spawnInterval = setInterval(spawnItem, 1200); 
        }

        function spawnItem() {
            if(itemsSpawned >= 20) return; 
            itemsSpawned++;

            let targetArr = storyProgress === 1 ? midConsonants : storyProgress === 2 ? highConsonants : storyProgress === 3 ? lowSingle : lowDouble;
            let isTarget = Math.random() > 0.4;
            let char = isTarget ? targetArr[Math.floor(Math.random()*targetArr.length)] : allConsonants[Math.floor(Math.random()*allConsonants.length)];
            
            let item = document.createElement('div');
            item.className = 'game-item'; item.innerText = char;
            item.style.left = Math.floor(Math.random() * 80) + 10 + '%';
            item.style.top = Math.floor(Math.random() * 70) + 15 + '%';
            
            document.getElementById('game-area').appendChild(item);
            setTimeout(() => { item.style.transform = 'scale(1)'; }, 10);
            
            let hideTimeout = setTimeout(() => {
                item.style.transform = 'scale(0)';
                setTimeout(() => { if(item.parentNode) item.remove(); 
                    if(itemsSpawned >= 20 && document.getElementById('game-area').childElementCount === 0) checkWinCondition();
                }, 200);
            }, 2000);

            item.onpointerdown = function(e) {
                e.preventDefault(); clearTimeout(hideTimeout);
                if(targetArr.includes(this.innerText)) {
                    playSfx('sfx-correct'); currentScore++;
                    document.getElementById('score').innerText = currentScore;
                    this.style.background = "#8bc34a"; this.style.color = "#fff";
                } else {
                    playSfx('sfx-wrong'); this.style.background = "#d32f2f"; this.style.color = "#fff";
                }
                this.style.transform = 'scale(0)';
                setTimeout(() => { 
                    this.remove(); 
                    if(currentScore >= 10) endGame(true); 
                    else if(itemsSpawned >= 20 && document.getElementById('game-area').childElementCount === 0) checkWinCondition();
                }, 200);
            };
        }

        function checkWinCondition() { if(currentScore >= 10) endGame(true); else endGame(false); }

        function endGame(isWin) {
            clearInterval(gameTimer); clearInterval(spawnInterval);
            document.getElementById('game-area').innerHTML = "";
            document.getElementById('game-hud').style.display = 'none';
            
            if(isWin) {
                storyProgress++; // อัปเลเวลไปด่านต่อไป!
                Swal.fire({ title: "เก่งมาก!", text: "ผ่านด่านนี้แล้ว ไปต่อกันเลย", icon: "success", confirmButtonColor: '#8b5a2b' })
                .then(() => { switchScene('scene-map'); resumeStory(); });
            } else {
                Swal.fire({ title: "ไม่ผ่านด่าน!", text: "ต้องเก็บให้ได้ 10 ตัวนะ ลองใหม่", icon: "error", confirmButtonColor: '#d32f2f' })
                .then(() => { switchScene('scene-map'); resumeStory(); });
            }
        }

        // ================= บอสไฟต์ =================
        function startBossGame() {
            document.getElementById('game-hud').style.display = 'flex';
            document.getElementById('quiz-container').style.display = 'block';
            let timeLeft = 240; currentScore = 0; quizIndex = 0;
            document.getElementById('score').innerText = currentScore;
            document.getElementById('timer').innerText = timeLeft;

            gameTimer = setInterval(() => {
                timeLeft--; document.getElementById('timer').innerText = timeLeft;
                if(timeLeft <= 0) endBoss();
            }, 1000);
            showQuiz();
        }

        function showQuiz() {
            if(quizIndex >= 30) { endBoss(); return; }
            document.getElementById('quiz-word').innerText = bossWords[quizIndex].w;
        }

        function checkQuiz(ans) {
            if(bossWords[quizIndex].a === ans) {
                playSfx('sfx-correct'); currentScore++; document.getElementById('score').innerText = currentScore;
            } else { playSfx('sfx-wrong'); }
            quizIndex++; showQuiz();
        }

        function endBoss() {
            clearInterval(gameTimer);
            document.getElementById('quiz-container').style.display = 'none';
            document.getElementById('game-hud').style.display = 'none';

            let totalDiamonds = Math.floor(currentScore / 2);
            let stars = totalDiamonds >= 12 ? "⭐⭐⭐" : totalDiamonds >= 8 ? "⭐⭐" : "⭐";

            Swal.fire({
                title: "ปราบวิหารสำเร็จ!", html: `คุณตอบถูก ${currentScore}/30 ข้อ<br>ได้รับเพชร ${totalDiamonds} 💎<br>ระดับความเก่ง: ${stars}`,
                imageUrl: 'https://cdn-icons-png.flaticon.com/512/4230/4230571.png', imageWidth: 200, 
                confirmButtonText: 'รับใบประกาศ!', confirmButtonColor: '#8bc34a', background: '#fff8e1'
            }).then(() => { location.reload(); });
        }
    </script>
</body>
