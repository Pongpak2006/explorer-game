<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ตะลุยป่า ไตรยางศ์</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root {
            /* ลิงก์รูปภาพทั้งหมด */
            --bg-start: url('https://img.magnific.com/free-vector/forest-scene-with-various-forest-trees_1308-57640.jpg?semt=ais_hybrid&w=740&q=80');
            --char-boy: url('https://i.postimg.cc/mrSpgYMf/2.png');
            --char-girl: url('https://i.postimg.cc/TYysJW8r/1.png');
            --icon-school: url('https://i.postimg.cc/q7gCZn0d/1.png'); 
            --icon-forest: url('https://i.postimg.cc/zGGLVWyN/2.png'); 
            --icon-cave: url('https://i.postimg.cc/g2txRJhM/3.png'); 
            --icon-camp: url('https://i.postimg.cc/8CFjbSBD/4.png'); 
            --icon-temple: url('https://i.postimg.cc/Bb3bsPrk/5.png'); 
            --chest-closed: url('https://cdn-icons-png.flaticon.com/512/4230/4230569.png');
            --chest-open: url('https://cdn-icons-png.flaticon.com/512/4230/4230571.png');
        }

        /* ล็อกฟอนต์ Sarabun ให้ใช้กับทุกๆ ส่วนในเว็บ */
        * { font-family: 'Sarabun', sans-serif !important; }

        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000; color: white; 
            user-select: none; touch-action: none;
        }

        /* ================= หน้าปลดล็อกเสียง (สำคัญมาก) ================= */
        #audio-unlocker {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 50, 0, 0.95); z-index: 9999; display: flex; 
            flex-direction: column; justify-content: center; align-items: center;
        }
        .unlock-btn {
            background: #ff9800; border: 5px solid #fff; border-radius: 50px;
            color: #fff; font-size: 35px; font-weight: 900; padding: 20px 50px;
            cursor: pointer; animation: pulse 1.5s infinite; box-shadow: 0 0 20px #ff9800;
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        .scene {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            background-image: var(--bg-start);
        }
        .scene.active { display: flex; }

        /* ================= ป้ายไม้ & UI ================= */
        .wood-panel {
            background: #a1662f; border: 8px solid #4a2e15; border-radius: 20px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5), 0 15px 25px rgba(0,0,0,0.8);
            padding: 40px; text-align: center; width: 85%; max-width: 500px; z-index: 100;
        }

        .game-title {
            white-space: nowrap; font-size: clamp(35px, 6vw, 65px); 
            color: #ffca28; text-shadow: 3px 3px 0 #4a2e15, 0 0 15px #000;
            margin: 0 0 25px 0; font-weight: 900; letter-spacing: 2px;
        }

        #input-name {
            padding: 15px; font-size: 26px; border-radius: 15px; border: 4px solid #5c3a21;
            text-align: center; margin-bottom: 25px; width: 80%; background: #fff8e1; 
            color: #4a2e15; font-weight: bold; outline: none;
        }

        .wood-btn {
            background: linear-gradient(to bottom, #d49a57, #8b5a2b);
            border: 4px solid #4a2e15; border-radius: 15px; color: #fff;
            font-size: 28px; font-weight: 900; padding: 15px 40px; cursor: pointer;
            box-shadow: 0 8px 0 #4a2e15; transition: 0.1s;
        }
        .wood-btn:active { transform: translateY(8px); box-shadow: 0 0 0 #4a2e15; }

        /* ปุ่ม Home */
        .home-btn {
            position: absolute; top: 20px; left: 20px; z-index: 2000;
            background: #fff; border: 4px solid #d32f2f; border-radius: 50%;
            width: 60px; height: 60px; display: none; justify-content: center; align-items: center;
            font-size: 30px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }
        .home-btn:active { transform: scale(0.9); }

        /* ================= ตัวละคร ================= */
        .char-model {
            width: 150px; height: 150px; background-size: contain; background-repeat: no-repeat; background-position: center;
            animation: breathe 1.5s infinite ease-in-out; filter: drop-shadow(0px 10px 5px rgba(0,0,0,0.5));
        }
        @keyframes breathe { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-8px) scale(1.02); } }

        .char-box {
            background: rgba(255,255,255,0.2); border: 4px solid transparent;
            border-radius: 20px; padding: 15px; cursor: pointer; transition: 0.2s;
        }
        .char-box:active { background: rgba(255,255,255,0.5); border: 4px solid #ffca28; }

        /* ================= แผนที่: รอยเท้า 👣 & ไอคอนใหญ่บึ้ม ================= */
        .footprint {
            position: absolute; font-size: 24px; opacity: 0.6; z-index: 10;
            text-shadow: 2px 2px 2px rgba(0,0,0,0.5);
        }
        
        .map-node {
            position: absolute; display: flex; flex-direction: column; align-items: center;
            transform: translate(-50%, -50%); z-index: 20; filter: drop-shadow(0 8px 8px rgba(0,0,0,0.6));
            animation: bounceNode 2s infinite ease-in-out;
        }
        @keyframes bounceNode { 0%, 100% { margin-top: 0; } 50% { margin-top: -15px; } }

        .node-img { width: 140px; height: 140px; background-size: contain; background-repeat: no-repeat; background-position: center; }
        .node-label {
            background: #fff; color: #4a2e15; border: 4px solid #4a2e15; padding: 5px 20px;
            border-radius: 20px; font-weight: 900; font-size: 18px; margin-top: -10px; white-space: nowrap; z-index: 21;
        }

        #map-avatar { 
            position: absolute; z-index: 50; transition: all 1.8s ease-in-out; 
            transform: translate(-50%, -50%); margin-top: -40px; top: -20%; left: -20%; 
        }

        /* ================= กล่องนำทาง (คำพูดตัวละคร) ================= */
        #dialogue-popup {
            position: absolute; background: #fff8e1; border: 6px solid #8b3a0f; border-radius: 20px;
            padding: 25px; color: #333; font-size: 24px; font-weight: bold; text-align: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.7); z-index: 1000; display: none; width: 320px; 
            transform: translate(-50%, -110%); margin-top: -80px;
        }
        .dialogue-arrow {
            content: ''; position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%);
            border-width: 20px 20px 0; border-style: solid; border-color: #8b3a0f transparent transparent transparent;
        }

        /* ================= มินิเกม & หีบ ================= */
        #game-chest {
            width: 280px; height: 280px; background-image: var(--chest-closed);
            background-size: contain; background-repeat: no-repeat; background-position: center;
            cursor: pointer; z-index: 200; display: none; animation: floatChest 2s infinite ease-in-out;
            filter: drop-shadow(0 20px 20px rgba(0,0,0,0.8));
        }
        @keyframes floatChest { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-25px); } }

        .game-item {
            position: absolute; width: 110px; height: 110px; background: #fff; border: 6px solid #4a2e15; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; font-size: 60px; font-weight: 900; color: #111; cursor: pointer;
            box-shadow: 0 10px 0 #4a2e15; pointer-events: auto; transform: scale(0); transition: transform 0.2s;
        }
        .game-item:active { transform: scale(0.9) translateY(10px); box-shadow: 0 0 0 #4a2e15; }

        .hud {
            position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.8); border: 3px solid #ffca28;
            padding: 15px 30px; border-radius: 20px; display: none; gap: 30px; font-size: 32px; font-weight: 900; z-index: 500;
        }

        /* ================= บอสไฟต์ (ด่าน 4) ================= */
        #quiz-container {
            background: rgba(255,255,255,0.95); border: 8px solid #4a2e15; border-radius: 25px;
            padding: 40px; width: 90%; max-width: 600px; text-align: center; display: none; z-index: 300;
        }
        .quiz-question { font-size: 45px; color: #d32f2f; font-weight: 900; margin-bottom: 30px; }
        .quiz-btn {
            display: block; width: 100%; background: #4caf50; border: 5px solid #1b5e20;
            color: white; font-size: 30px; font-weight: bold; padding: 20px; border-radius: 20px;
            margin-bottom: 20px; cursor: pointer; box-shadow: 0 8px 0 #1b5e20; transition: 0.1s;
        }
        .quiz-btn:active { transform: translateY(8px); box-shadow: 0 0 0 #1b5e20; }
    </style>
</head>
<body>

    <audio id="bg-music" src="https://cdn.pixabay.com/download/audio/2022/10/14/audio_9939ef7491.mp3?filename=adventure-exploration-121541.mp3" loop preload="auto"></audio>
    <audio id="sfx-click" src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_3d30b9bb85.mp3?filename=coin-collect-retro-8-bit-sound-effect-145251.mp3" preload="auto"></audio>
    <audio id="sfx-magic" src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_c35f2991dd.mp3?filename=magic-spell-6005.mp3" preload="auto"></audio>
    <audio id="sfx-paper" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_731422edba.mp3?filename=paper-flutter-99532.mp3" preload="auto"></audio>
    <audio id="sfx-correct" src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_924bb7eb40.mp3?filename=correct-6033.mp3" preload="auto"></audio>
    <audio id="sfx-wrong" src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_c6ccf3232f.mp3?filename=negative_beeps-6008.mp3" preload="auto"></audio>

    <div id="audio-unlocker">
        <h1 style="color: #ffca28; font-size: 50px; text-shadow: 2px 2px #000; text-align: center; margin-bottom: 40px;">พร้อมตะลุยป่าหรือยัง?</h1>
        <button class="unlock-btn" onclick="unlockAudio()">แตะเพื่อเริ่มเกม</button>
    </div>

    <div class="home-btn" id="home-btn" onclick="location.reload()">🏠</div>

    <div id="scene-title" class="scene">
        <div class="wood-panel">
            <h1 class="game-title">ตะลุยป่าไตรยางศ์</h1>
            <input type="text" id="input-name" placeholder="ชื่อนักสำรวจ...">
            <br>
            <button class="wood-btn" onclick="goToCharSelect()">เริ่มการผจญภัย</button>
        </div>
    </div>

    <div id="scene-char" class="scene">
        <div class="wood-panel">
            <h2 style="margin:0 0 20px 0; color:#fff; text-shadow:2px 2px #4a2e15; font-size: 35px;">เลือกคู่หูของคุณ</h2>
            <div style="display: flex; gap: 30px; justify-content: center;">
                <div class="char-box" onclick="enterMap('boy')">
                    <div class="char-model" style="background-image: var(--char-boy);"></div>
                    <h3 style="margin:15px 0 0 0; color:#fff; font-size: 26px;">เด็กชาย</h3>
                </div>
                <div class="char-box" onclick="enterMap('girl')">
                    <div class="char-model" style="background-image: var(--char-girl);"></div>
                    <h3 style="margin:15px 0 0 0; color:#fff; font-size: 26px;">เด็กหญิง</h3>
                </div>
            </div>
        </div>
    </div>

    <div id="scene-map" class="scene">
        <div class="footprint" style="bottom: 30%; left: 22%;">👣</div>
        <div class="footprint" style="bottom: 40%; left: 28%;">👣</div>
        <div class="footprint" style="bottom: 45%; left: 45%;">👣</div>
        <div class="footprint" style="bottom: 40%; left: 52%;">👣</div>
        <div class="footprint" style="bottom: 45%; left: 68%;">👣</div>
        <div class="footprint" style="bottom: 53%; left: 75%;">👣</div>
        <div class="footprint" style="bottom: 70%; left: 75%;">👣</div>
        <div class="footprint" style="bottom: 75%; left: 60%;">👣</div>

        <div class="map-node" style="bottom: 15%; left: 15%;" id="node-0">
            <div class="node-img" style="background-image: var(--icon-school);"></div>
            <div class="node-label">จุดเริ่มต้น</div>
        </div>
        <div class="map-node" style="bottom: 48%; left: 35%;" id="node-1">
            <div class="node-img" style="background-image: var(--icon-forest);"></div>
            <div class="node-label">1. ป่าดงดิบ</div>
        </div>
        <div class="map-node" style="bottom: 35%; left: 60%;" id="node-2">
            <div class="node-img" style="background-image: var(--icon-cave);"></div>
            <div class="node-label">2. ถ้ำลึกลับ</div>
        </div>
        <div class="map-node" style="bottom: 60%; left: 80%;" id="node-3">
            <div class="node-img" style="background-image: var(--icon-camp);"></div>
            <div class="node-label">3. ค่ายริมน้ำ</div>
        </div>
        <div class="map-node" style="bottom: 80%; left: 45%;" id="node-4">
            <div class="node-img" style="background-image: var(--icon-temple);"></div>
            <div class="node-label">4. วิหารโบราณ</div>
        </div>

        <div id="map-avatar" class="char-model"></div>

        <div id="dialogue-popup">
            <div id="dialogue-text">...</div>
            <div class="dialogue-arrow"></div>
            <div style="color: #d32f2f; font-size: 18px; margin-top: 15px; cursor: pointer; animation: breathe 1s infinite;" onclick="nextDialogue()">▶ แตะเพื่อไปต่อ</div>
        </div>
    </div>

    <div id="scene-game" class="scene">
        <div id="game-chest" onclick="openChest()"></div>
        <div class="hud" id="game-hud">
            <div style="color: #00e5ff;">💎 <span id="score">0</span></div>
            <div style="color: #ffeb3b;">⏳ <span id="timer">180</span></div>
        </div>
        <div id="game-area" style="width: 100%; height: 100%; position: relative;"></div>
        
        <div id="quiz-container">
            <div class="quiz-question">คำว่า "<span id="quiz-word">ไก่</span>" <br>มีพยัญชนะต้นหมู่อะไร?</div>
            <button class="quiz-btn" onclick="checkQuiz('อักษรกลาง')">อักษรกลาง</button>
            <button class="quiz-btn" style="background: #f44336; border-color: #b71c1c;" onclick="checkQuiz('อักษรสูง')">อักษรสูง</button>
            <button class="quiz-btn" style="background: #2196f3; border-color: #0d47a1;" onclick="checkQuiz('อักษรต่ำ')">อักษรต่ำ</button>
        </div>
    </div>

    <script>
        // ================= ระบบแก้เสียง (ทำงาน 1000%) =================
        function unlockAudio() {
            let bgm = document.getElementById('bg-music');
            bgm.volume = 0.4; bgm.play();
            
            ['sfx-click', 'sfx-magic', 'sfx-paper', 'sfx-correct', 'sfx-wrong'].forEach(id => {
                let a = document.getElementById(id);
                if(a) { a.volume = 0; a.play().catch(e=>{}); a.pause(); a.currentTime = 0; a.volume = 1; }
            });
            
            document.getElementById('audio-unlocker').style.display = 'none';
            switchScene('scene-title');
        }

        function playSfx(id) {
            let sound = document.getElementById(id);
            if(sound) { sound.currentTime = 0; sound.play().catch(e => console.log(e)); }
        }

        // ================= ข้อมูลเกม & การนำทาง =================
        let playerName = "", currentScore = 0, gameTimer, spawnInterval, itemsSpawned = 0;
        let storyProgress = 0; // 0=โรงเรียน, 1=ป่า, 2=ถ้ำ, 3=ค่าย(เดี่ยว), 4=ค่าย(คู่), 5=วิหาร(บอส)
        
        const midConsonants = ['ก','จ','ด','ต','บ','ป','อ'];
        const highConsonants = ['ข','ฉ','ฐ','ถ','ผ','ฝ','ศ','ษ','ส','ห'];
        const lowSingle = ['ง','ญ','น','ย','ณ','ร','ว','ม','ฬ'];
        const lowDouble = ['ค','ฅ','ฆ','ช','ซ','ฌ','ฑ','ฒ','ท','ธ','พ','ฟ','ภ','ฮ'];
        const allConsonants = midConsonants.concat(highConsonants, lowSingle, lowDouble);

        const bossWords = [
            {w:"ไก่", a:"อักษรกลาง"}, {w:"ไข่", a:"อักษรสูง"}, {w:"ช้าง", a:"อักษรต่ำ"}, {w:"เด็ก", a:"อักษรกลาง"},
            {w:"ถุง", a:"อักษรสูง"}, {w:"ม้า", a:"อักษรต่ำ"}, {w:"ดาว", a:"อักษรกลาง"}, {w:"เสือ", a:"อักษรสูง"}, 
            {w:"เรือ", a:"อักษรต่ำ"}, {w:"ปลา", a:"อักษรกลาง"}, {w:"ผึ้ง", a:"อักษรสูง"}, {w:"นก", a:"อักษรต่ำ"}, 
            {w:"บ้าน", a:"อักษรกลาง"}, {w:"หมา", a:"อักษรสูง"}, {w:"ลิง", a:"อักษรต่ำ"}, {w:"เต่า", a:"อักษรกลาง"}, 
            {w:"ฝน", a:"อักษรสูง"}, {w:"งู", a:"อักษรต่ำ"}, {w:"อ่าง", a:"อักษรกลาง"}, {w:"ข้าว", a:"อักษรสูง"},
            {w:"แพ", a:"อักษรต่ำ"}, {w:"ใบไม้", a:"อักษรกลาง"}, {w:"เสื้อ", a:"อักษรสูง"}, {w:"แมว", a:"อักษรต่ำ"},
            {w:"จาน", a:"อักษรกลาง"}, {w:"ศาลา", a:"อักษรสูง"}, {w:"ธง", a:"อักษรต่ำ"}, {w:"ปู", a:"อักษรกลาง"},
            {w:"ผี", a:"อักษรสูง"}, {w:"ควาย", a:"อักษรต่ำ"}
        ];
        let quizIndex = 0;

        function switchScene(id) {
            document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // 1. กดปุ่มเริ่ม
        function goToCharSelect() {
            playerName = document.getElementById('input-name').value;
            if(!playerName) { alert('พิมพ์ชื่อนักสำรวจก่อนน้า!'); return; }
            playSfx('sfx-click');
            document.getElementById('home-btn').style.display = 'flex';
            switchScene('scene-char');
        }

        // 2. เลือกคู่หู
        function enterMap(gender) {
            playSfx('sfx-click');
            const avatarUrl = gender === 'boy' ? 'url("https://i.postimg.cc/mrSpgYMf/2.png")' : 'url("https://i.postimg.cc/TYysJW8r/1.png")';
            document.getElementById('map-avatar').style.backgroundImage = avatarUrl;
            
            switchScene('scene-map');
            resumeStory(); // ระบบคำนวณและเดินเองอัตโนมัติ
        }

        // 3. ระบบนำทางอัตโนมัติ (ไม่รวน 100%)
        const nodePositions = [
            { id: 0, bottom: '15%', left: '10%' }, // โรงเรียน
            { id: 1, bottom: '48%', left: '35%' }, // ป่า (ด่าน 1)
            { id: 2, bottom: '35%', left: '60%' }, // ถ้ำ (ด่าน 2)
            { id: 3, bottom: '60%', left: '80%' }, // ค่าย (ด่าน 3)
            { id: 4, bottom: '80%', left: '45%' }  // วิหาร (บอส)
        ];

        function resumeStory() {
            let avatar = document.getElementById('map-avatar');
            document.getElementById('dialogue-popup').style.display = 'none';

            let targetNode = 0;
            if(storyProgress === 0) targetNode = 0;
            else if(storyProgress === 1) targetNode = 1;
            else if(storyProgress === 2) targetNode = 2;
            else if(storyProgress === 3 || storyProgress === 4) targetNode = 3; 
            else if(storyProgress === 5) targetNode = 4;

            // สั่งตัวละครเดิน
            avatar.style.bottom = nodePositions[targetNode].bottom;
            avatar.style.left = nodePositions[targetNode].left;

            // พอเดินถึง เปิดคำสนทนา
            setTimeout(() => {
                let msgs = [];
                if(storyProgress === 0) msgs = [`สวัสดี ${playerName}!`, `เราจะเริ่มจากโรงเรียนนะ`, `พร้อมไป "ป่าดงดิบ" กันหรือยัง?`];
                if(storyProgress === 1) msgs = [`ถึงป่าดงดิบแล้ว!`, `ภารกิจที่ 1 "อักษรกลาง" รออยู่ ลุยเลยไหม?`];
                if(storyProgress === 2) msgs = [`ถึงถ้ำลึกลับแล้ว!`, `ภารกิจที่ 2 "อักษรสูง" รออยู่ ไปกันเลย!`];
                if(storyProgress === 3) msgs = [`ถึงค่ายริมน้ำ!`, `ภารกิจที่ 3 แบ่ง 2 รอบนะ เริ่มที่ "อักษรต่ำเดี่ยว" ก่อน`];
                if(storyProgress === 4) msgs = [`ยอดเยี่ยมมาก!`, `ลุยรอบที่สอง "อักษรต่ำคู่" ต่อเลย!`];
                if(storyProgress === 5) msgs = [`ถึงวิหารโบราณแล้ว!`, `บอสเตรียมคำถามไว้ 30 ข้อ ไปปราบมันกัน!🐘`];

                showPopupDialogue(`node-${targetNode}`, msgs, () => {
                    if(storyProgress === 0) {
                        storyProgress = 1; resumeStory(); // เดินไปด่าน 1
                    } else {
                        prepareMission(); // เข้าฉากมินิเกม
                    }
                });
            }, 1800);
        }

        let dialogueStack = [], dialogueCallback = null;
        function showPopupDialogue(nodeId, list, callback) {
            dialogueStack = list; dialogueCallback = callback;
            let node = document.getElementById(nodeId);
            let popup = document.getElementById('dialogue-popup');
            
            popup.style.bottom = (parseInt(node.style.bottom) + 15) + '%';
            popup.style.left = node.style.left;
            popup.style.display = 'block';
            nextDialogue();
        }

        function nextDialogue() {
            playSfx('sfx-click');
            if(dialogueStack.length === 0) {
                document.getElementById('dialogue-popup').style.display = 'none';
                if(dialogueCallback) dialogueCallback();
                return;
            }
            document.getElementById('dialogue-text').innerText = dialogueStack.shift();
        }

        // 4. เข้าฉากหีบ
        function prepareMission() {
            switchScene('scene-game');
            document.getElementById('quiz-container').style.display = 'none';
            let chest = document.getElementById('game-chest');
            chest.style.backgroundImage = 'var(--chest-closed)';
            chest.style.display = 'block';
        }

        // 5. เปิดหีบ และแสดงลายแทง
        function openChest() {
            playSfx('sfx-magic');
            let chest = document.getElementById('game-chest');
            chest.style.backgroundImage = 'var(--chest-open)';
            
            setTimeout(() => {
                chest.style.display = 'none';
                playSfx('sfx-paper'); // เสียงเปิดกระดาษ
                
                let mapMsg = "";
                if(storyProgress === 1) mapMsg = "ไก่ จิก เด็ก ตาย...<br><br><span style='color:red;'>หาอักษรกลาง 10 ตัว</span>";
                if(storyProgress === 2) mapMsg = "ผี ฝาก ถุง ข้าวสาร...<br><br><span style='color:red;'>หาอักษรสูง 10 ตัว</span>";
                if(storyProgress === 3) mapMsg = "งูใหญ่ นอนอยู่...<br><br><span style='color:red;'>หาอักษรต่ำเดี่ยว 10 ตัว</span>";
                if(storyProgress === 4) mapMsg = "พ่อค้า ฟันทอง...<br><br><span style='color:red;'>หาอักษรต่ำคู่ 10 ตัว</span>";
                if(storyProgress === 5) mapMsg = "ตอบคำถาม 30 ข้อ เพื่อเปิดประตูวิหาร!";

                Swal.fire({
                    title: 'เจอลายแทงสมบัติ!', html: mapMsg,
                    imageUrl: 'https://cdn-icons-png.flaticon.com/512/7517/7517228.png', imageWidth: 160,
                    confirmButtonText: 'เริ่มเกม!', confirmButtonColor: '#8b5a2b', background: '#fff8e1'
                }).then(() => {
                    if(storyProgress === 5) startBossGame(); else startGame();
                });
            }, 800);
        }

        // ================= มินิเกม 1-4 =================
        function startGame() {
            document.getElementById('game-hud').style.display = 'flex';
            let timeLeft = 180; currentScore = 0; itemsSpawned = 0;
            document.getElementById('score').innerText = currentScore;
            document.getElementById('timer').innerText = timeLeft;

            gameTimer = setInterval(() => {
                timeLeft--; document.getElementById('timer').innerText = timeLeft;
                if(timeLeft <= 0) endGame(false);
            }, 1000);

            spawnInterval = setInterval(spawnItem, 1200); 
        }

        function spawnItem() {
            if(itemsSpawned >= 20) return; 
            itemsSpawned++;

            let targetArr = storyProgress === 1 ? midConsonants : storyProgress === 2 ? highConsonants : storyProgress === 3 ? lowSingle : lowDouble;
            let isTarget = Math.random() > 0.4;
            let char = isTarget ? targetArr[Math.floor(Math.random()*targetArr.length)] : allConsonants[Math.floor(Math.random()*allConsonants.length)];
            
            let item = document.createElement('div');
            item.className = 'game-item'; item.innerText = char;
            item.style.left = Math.floor(Math.random() * 80) + 10 + '%';
            item.style.top = Math.floor(Math.random() * 70) + 15 + '%';
            
            document.getElementById('game-area').appendChild(item);
            setTimeout(() => { item.style.transform = 'scale(1)'; }, 10);
            
            let hideTimeout = setTimeout(() => {
                item.style.transform = 'scale(0)';
                setTimeout(() => { if(item.parentNode) item.remove(); 
                    if(itemsSpawned >= 20 && document.getElementById('game-area').childElementCount === 0) checkWinCondition();
                }, 200);
            }, 2000);

            item.onpointerdown = function(e) {
                e.preventDefault(); clearTimeout(hideTimeout);
                if(targetArr.includes(this.innerText)) {
                    playSfx('sfx-correct'); currentScore++;
                    document.getElementById('score').innerText = currentScore;
                    this.style.background = "#8bc34a"; this.style.color = "#fff";
                } else {
                    playSfx('sfx-wrong'); this.style.background = "#d32f2f"; this.style.color = "#fff";
                }
                this.style.transform = 'scale(0)';
                setTimeout(() => { 
                    this.remove(); 
                    if(currentScore >= 10) endGame(true); 
                    else if(itemsSpawned >= 20 && document.getElementById('game-area').childElementCount === 0) checkWinCondition();
                }, 200);
            };
        }

        function checkWinCondition() { if(currentScore >= 10) endGame(true); else endGame(false); }

        function endGame(isWin) {
            clearInterval(gameTimer); clearInterval(spawnInterval);
            document.getElementById('game-area').innerHTML = "";
            document.getElementById('game-hud').style.display = 'none';
            
            if(isWin) {
                storyProgress++; 
                if(storyProgress === 4) {
                    Swal.fire({ title: "ผ่านรอบแรก!", text: "ลุย ต่ำคู่ ต่อเลย!", icon: "success", confirmButtonColor: '#8b5a2b' })
                    .then(() => { switchScene('scene-map'); resumeStory(); });
                } else {
                    Swal.fire({ title: "เก่งมาก!", text: "ผ่านด่านนี้แล้ว ไปต่อกันเลย", icon: "success", confirmButtonColor: '#8b5a2b' })
                    .then(() => { switchScene('scene-map'); resumeStory(); });
                }
            } else {
                Swal.fire({ title: "หมดเวลา!", text: "ต้องเก็บให้ได้ 10 ตัวนะ ลองใหม่สู้ๆ", icon: "error", confirmButtonColor: '#d32f2f' })
                .then(() => { switchScene('scene-map'); resumeStory(); });
            }
        }

        // ================= บอสไฟต์ 30 ข้อ =================
        function startBossGame() {
            document.getElementById('game-hud').style.display = 'flex';
            document.getElementById('quiz-container').style.display = 'block';
            let timeLeft = 240; currentScore = 0; quizIndex = 0;
            document.getElementById('score').innerText = currentScore;
            document.getElementById('timer').innerText = timeLeft;

            gameTimer = setInterval(() => {
                timeLeft--; document.getElementById('timer').innerText = timeLeft;
                if(timeLeft <= 0) endBoss();
            }, 1000);
            showQuiz();
        }

        function showQuiz() {
            if(quizIndex >= 30) { endBoss(); return; }
            document.getElementById('quiz-word').innerText = bossWords[quizIndex].w;
        }

        function checkQuiz(ans) {
            if(bossWords[quizIndex].a === ans) {
                playSfx('sfx-correct'); currentScore++; document.getElementById('score').innerText = currentScore;
            } else { playSfx('sfx-wrong'); }
            quizIndex++; showQuiz();
        }

        function endBoss() {
            clearInterval(gameTimer);
            document.getElementById('quiz-container').style.display = 'none';
            document.getElementById('game-hud').style.display = 'none';

            let totalDiamonds = Math.floor(currentScore / 2);
            let stars = totalDiamonds >= 12 ? "⭐⭐⭐" : totalDiamonds >= 8 ? "⭐⭐" : "⭐";

            Swal.fire({
                title: "จบการผจญภัย!", html: `คุณตอบถูก ${currentScore}/30 ข้อ<br>ได้รับเพชร ${totalDiamonds} 💎<br>ระดับความเก่ง: ${stars}`,
                imageUrl: 'https://cdn-icons-png.flaticon.com/512/4230/4230571.png', imageWidth: 200, 
                confirmButtonText: 'รับรางวัลกับคุณครู!', confirmButtonColor: '#8bc34a', background: '#fff8e1'
            }).then(() => { location.reload(); });
        }
    </script>
</body>
</html>
