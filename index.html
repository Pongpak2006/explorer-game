<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ตะลุยป่า ไตรยางศ์</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root {
            --bg-start: url('https://img.magnific.com/free-vector/forest-scene-with-various-forest-trees_1308-57640.jpg?semt=ais_hybrid&w=740&q=80');
            --char-boy: url('https://i.postimg.cc/mrSpgYMf/2.png');
            --char-girl: url('https://i.postimg.cc/TYysJW8r/1.png');
            --icon-school: url('https://i.postimg.cc/q7gCZn0d/1.png'); 
            --icon-forest: url('https://i.postimg.cc/zGGLVWyN/2.png'); 
            --icon-cave: url('https://i.postimg.cc/g2txRJhM/3.png'); 
            --icon-camp: url('https://i.postimg.cc/8CFjbSBD/4.png'); 
            --icon-temple: url('https://i.postimg.cc/Bb3bsPrk/5.png'); 
            --chest-closed: url('https://cdn-icons-png.flaticon.com/512/4230/4230569.png');
            --chest-open: url('https://cdn-icons-png.flaticon.com/512/4230/4230571.png');
        }

        * { font-family: 'Sarabun', sans-serif; box-sizing: border-box; }

        html, body {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            overflow: hidden; background-color: #000; color: white; 
            user-select: none; touch-action: none;
        }

        .scene {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: var(--bg-start); background-size: cover; background-position: center;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .scene.active { display: flex; }

        /* ================= UI หน้าแรก (แก้ไขซูมล้นจอ) ================= */
        .wood-panel {
            background: #a1662f; border: 6px solid #4a2e15; border-radius: 20px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5), 0 15px 25px rgba(0,0,0,0.8);
            padding: 25px; text-align: center; width: 90%; max-width: 400px; z-index: 100;
        }

        .game-title {
            font-size: clamp(30px, 8vw, 45px); /* ปรับขนาดอัตโนมัติ */
            color: #ffca28; text-shadow: 2px 2px 0 #4a2e15, 0 0 10px #000;
            margin: 0 0 20px 0; font-weight: 900; line-height: 1.2;
        }

        #input-name {
            padding: 12px; font-size: 20px; border-radius: 10px; border: 3px solid #5c3a21;
            text-align: center; margin-bottom: 20px; width: 100%;
            background: #fff8e1; color: #4a2e15; font-weight: bold; outline: none;
        }

        .wood-btn {
            background: linear-gradient(to bottom, #d49a57, #8b5a2b);
            border: 3px solid #4a2e15; border-radius: 15px; color: #fff;
            font-size: 22px; font-weight: 900; padding: 12px 30px; cursor: pointer;
            box-shadow: 0 6px 0 #4a2e15; transition: 0.1s; width: 100%;
        }
        .wood-btn:active { transform: translateY(6px); box-shadow: 0 0 0 #4a2e15; }

        /* ================= เลือกตัวละคร ================= */
        .char-box {
            background: rgba(255,255,255,0.2); border: 4px solid transparent;
            border-radius: 20px; padding: 15px; cursor: pointer; transition: 0.2s; text-align: center; flex: 1;
        }
        .char-box:active { background: rgba(255,255,255,0.5); border: 4px solid #ffca28; }
        .char-model-select {
            width: 100%; height: 100px; background-size: contain; background-repeat: no-repeat; background-position: center;
            animation: breathe 1.5s infinite ease-in-out; filter: drop-shadow(0px 10px 5px rgba(0,0,0,0.5));
        }

        @keyframes breathe { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-5px) scale(1.02); } }

        /* ================= แผนที่ & เส้นประสุดแม่นยำ ================= */
        #svg-path { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; pointer-events: none; }
        
        .map-node {
            position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: center;
            transform: translate(-50%, -50%); z-index: 20;
            animation: bounceNode 2s infinite ease-in-out;
        }
        @keyframes bounceNode { 0%, 100% { margin-top: 0; } 50% { margin-top: -8px; } }

        .node-img { width: 90px; height: 90px; background-size: contain; background-repeat: no-repeat; background-position: center; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.6)); }
        .node-label {
            background: #fff; color: #4a2e15; border: 3px solid #4a2e15; padding: 2px 10px;
            border-radius: 15px; font-weight: 900; font-size: 14px; margin-top: 0px; white-space: nowrap;
        }

        #map-avatar { 
            position: absolute; z-index: 50; transition: all 1.5s ease-in-out; 
            width: 80px; height: 80px; background-size: contain; background-repeat: no-repeat; background-position: center;
            transform: translate(-50%, -50%); margin-top: -30px; /* ให้ยืนทับจุด */
            filter: drop-shadow(0 8px 4px rgba(0,0,0,0.6));
            animation: breathe 1s infinite alternate ease-in-out;
        }

        /* ================= กล่องนำทาง (แก้ข้อความทับกัน) ================= */
        #dialogue-popup {
            position: absolute; background: #fff8e1; border: 4px solid #8b3a0f; border-radius: 15px;
            padding: 15px; color: #333; font-weight: bold; text-align: center;
            box-shadow: 0 8px 15px rgba(0,0,0,0.6); z-index: 1000; display: none; width: 250px; 
            transform: translate(-50%, -100%); margin-top: -65px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .dialogue-arrow {
            content: ''; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%);
            border-width: 10px 10px 0; border-style: solid; border-color: #8b3a0f transparent transparent transparent;
        }

        /* ================= เกม & หีบสมบัติ ================= */
        #game-chest {
            width: 250px; height: 250px; background-image: var(--chest-closed);
            background-size: contain; background-repeat: no-repeat; background-position: center;
            cursor: pointer; z-index: 200; display: none; animation: floatChest 2s infinite ease-in-out;
            filter: drop-shadow(0 15px 15px rgba(0,0,0,0.8));
        }
        @keyframes floatChest { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        .game-item {
            position: absolute; width: 80px; height: 80px; background: #fff; border: 4px solid #4a2e15; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; font-size: 40px; font-weight: 900; color: #111; cursor: pointer;
            box-shadow: 0 6px 0 #4a2e15; pointer-events: auto;
        }

        .hud {
            position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.8); border: 3px solid #ffca28;
            padding: 5px 15px; border-radius: 15px; display: none; gap: 15px; font-size: 20px; font-weight: 900; z-index: 500;
        }

        #basket {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 150px; height: 100px; background: url('https://cdn-icons-png.flaticon.com/512/3752/3752674.png') center/contain no-repeat;
            display: none; z-index: 100; pointer-events: none;
        }

        #quiz-container {
            background: rgba(255,255,255,0.95); border: 6px solid #4a2e15; border-radius: 20px;
            padding: 20px; width: 90%; max-width: 400px; text-align: center; display: none; z-index: 300;
        }
        .quiz-question { font-size: 28px; color: #d32f2f; font-weight: 900; margin-bottom: 20px; }
        .quiz-btn {
            display: block; width: 100%; background: #4caf50; border: 4px solid #1b5e20;
            color: white; font-size: 20px; font-weight: bold; padding: 10px; border-radius: 15px;
            margin-bottom: 10px; cursor: pointer; box-shadow: 0 5px 0 #1b5e20; transition: 0.1s;
        }
        .quiz-btn:active { transform: translateY(5px); box-shadow: 0 0 0 #1b5e20; }
    </style>
</head>
<body>

    <audio id="sfx-click" src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg" preload="auto"></audio>
    <audio id="sfx-chest" src="https://actions.google.com/sounds/v1/alarms/spaceship_alarm.ogg" preload="auto"></audio> <audio id="sfx-correct" src="https://actions.google.com/sounds/v1/cartoon/cartoon_cowbell.ogg" preload="auto"></audio>
    <audio id="sfx-wrong" src="https://actions.google.com/sounds/v1/cartoon/slip_and_fall.ogg" preload="auto"></audio>
    <audio id="sfx-drop" src="https://actions.google.com/sounds/v1/cartoon/pop.ogg" preload="auto"></audio>
    
    <audio id="bgm-m1" src="https://mp3tourl.com/audio/1779823159138-3ce05243-a30b-4196-855b-f6a73d8ad7ab.mp3" loop preload="auto"></audio>
    <audio id="bgm-m2" src="https://mp3tourl.com/audio/1779823741006-10020f71-6fa5-4555-8789-80bdec86c0ec.mp3" loop preload="auto"></audio>
    <audio id="bgm-m3" src="https://mp3tourl.com/audio/1779824125833-193b9958-8213-4afa-bbb5-712dbda98016.mp3" loop preload="auto"></audio>

    <div id="scene-title" class="scene active">
        <div class="wood-panel">
            <h1 class="game-title">ตะลุยป่า<br>ไตรยางศ์</h1>
            <input type="text" id="input-name" placeholder="ชื่อนักสำรวจ...">
            <button class="wood-btn" onclick="goToCharSelect()">เริ่มการผจญภัย</button>
        </div>
    </div>

    <div id="scene-char" class="scene">
        <div class="wood-panel">
            <h2 style="margin:0 0 20px 0; color:#fff; text-shadow:2px 2px #4a2e15; font-size: 26px;">เลือกคู่หูของคุณ</h2>
            <div style="display: flex; gap: 20px; justify-content: center;">
                <div class="char-box" onclick="enterMap('boy')">
                    <div class="char-model-select" style="background-image: var(--char-boy);"></div>
                    <h3 style="margin:10px 0 0 0; color:#fff;">ชาย</h3>
                </div>
                <div class="char-box" onclick="enterMap('girl')">
                    <div class="char-model-select" style="background-image: var(--char-girl);"></div>
                    <h3 style="margin:10px 0 0 0; color:#fff;">หญิง</h3>
                </div>
            </div>
        </div>
    </div>

    <div id="scene-map" class="scene">
        <svg id="svg-path" viewBox="0 0 100 100" preserveAspectRatio="none">
            <polyline id="svg-line" points="" fill="none" stroke="white" stroke-width="1.5" stroke-dasharray="3,3" />
        </svg>

        <div class="map-node" id="node-0"><div class="node-img" style="background-image: var(--icon-school);"></div><div class="node-label">จุดเริ่มต้น</div></div>
        <div class="map-node" id="node-1"><div class="node-img" style="background-image: var(--icon-forest);"></div><div class="node-label">1. ป่าดงดิบ</div></div>
        <div class="map-node" id="node-2"><div class="node-img" style="background-image: var(--icon-cave);"></div><div class="node-label">2. ถ้ำลึกลับ</div></div>
        <div class="map-node" id="node-3"><div class="node-img" style="background-image: var(--icon-camp);"></div><div class="node-label">3. ค่ายริมน้ำ</div></div>
        <div class="map-node" id="node-4"><div class="node-img" style="background-image: var(--icon-temple);"></div><div class="node-label">4. วิหารโบราณ</div></div>

        <div id="map-avatar"></div>

        <div id="dialogue-popup" style="display: none;">
            <div id="dialogue-text" style="font-size: 20px; margin-bottom: 10px;">...</div>
            <div style="color: #d32f2f; font-size: 16px; cursor: pointer; animation: breathe 1s infinite alternate;" onclick="nextDialogue()">▶ แตะเพื่อไปต่อ</div>
            <div class="dialogue-arrow"></div>
        </div>
    </div>

    <div id="scene-game" class="scene">
        <div id="game-chest" onclick="openChest()"></div>
        <div class="hud" id="game-hud">
            <div style="color: #00e5ff;">💎 <span id="score">0</span>/20</div>
            <div style="color: #ffeb3b;">⏳ <span id="timer">180</span></div>
        </div>
        <div id="game-area" style="width: 100%; height: 100%; position: relative;"></div>
        
        <div id="basket"></div>
        
        <div id="quiz-container">
            <div class="quiz-question">คำว่า "<span id="quiz-word">ไก่</span>" <br>หมู่อักษรใด?</div>
            <button class="quiz-btn" onclick="checkQuiz('กลาง')">อักษรกลาง</button>
            <button class="quiz-btn" style="background: #f44336; border-color: #b71c1c;" onclick="checkQuiz('สูง')">อักษรสูง</button>
            <button class="quiz-btn" style="background: #2196f3; border-color: #0d47a1;" onclick="checkQuiz('ต่ำเดี่ยว')">อักษรต่ำเดี่ยว</button>
            <button class="quiz-btn" style="background: #9c27b0; border-color: #6a1b9a;" onclick="checkQuiz('ต่ำคู่')">อักษรต่ำคู่</button>
        </div>
    </div>

    <script>
        const sheetUrl = "https://script.google.com/macros/s/AKfycbxQHu86mWczbFPaJ_JGHih5nIHxMye7S01qevDns2KSYDs5_lHWVOIFqJ8TUHc15TfY/exec";

        // ================= ปลดล็อกเสียงทั้งหมด =================
        function initAudio() {
            ['sfx-click', 'sfx-chest', 'sfx-correct', 'sfx-wrong', 'sfx-drop', 'bgm-m1', 'bgm-m2', 'bgm-m3'].forEach(id => {
                let el = document.getElementById(id);
                if(el) { el.volume = 0; el.play().catch(()=>{}); el.pause(); el.currentTime = 0; el.volume = 1; }
            });
        }
        function playSfx(id) { let a = document.getElementById(id); if(a){ a.currentTime=0; a.play().catch(()=>{}); } }
        function stopAllBgm() { ['bgm-m1', 'bgm-m2', 'bgm-m3'].forEach(id => { let a = document.getElementById(id); if(a) { a.pause(); a.currentTime = 0; }}); }

        // ================= ข้อมูลเกม =================
        let playerName = "", currentScore = 0, totalDiamonds = 0, gameTimer, spawnInterval, itemsSpawned = 0;
        let storyProgress = 0; // 0=เริ่ม, 1=M1, 2=M2, 3=M3(เดี่ยว), 4=M3(คู่), 5=M4
        let scoresData = { m1: 0, m2: 0, m31: 0, m32: 0, m4: 0 };
        let layoutCoords = []; 
        
        const midCons = ['ก','จ','ด','ต','บ','ป','อ','ฎ','ฏ'];
        const highCons = ['ข','ฃ','ฉ','ฐ','ถ','ผ','ฝ','ศ','ษ','ส','ห'];
        const lowSingle = ['ง','ญ','ณ','น','ม','ย','ร','ล','ว','ฬ'];
        const lowDouble = ['ค','ฅ','ฆ','ช','ซ','ฌ','ฑ','ฒ','ท','ธ','พ','ฟ','ภ','ฮ'];
        const allCons = [...midCons, ...highCons, ...lowSingle, ...lowDouble];

        const quizData = [
            {w:"ไก่", a:"กลาง"}, {w:"จาน", a:"กลาง"}, {w:"เด็ก", a:"กลาง"}, {w:"เต่า", a:"กลาง"}, {w:"ใบไม้", a:"กลาง"}, {w:"ปลา", a:"กลาง"}, {w:"อ่าง", a:"กลาง"},
            {w:"ไข่", a:"สูง"}, {w:"ฉิ่ง", a:"สูง"}, {w:"ถุง", a:"สูง"}, {w:"ผึ้ง", a:"สูง"}, {w:"ฝา", a:"สูง"}, {w:"ศาลา", a:"สูง"}, {w:"เสือ", a:"สูง"}, {w:"หมา", a:"สูง"},
            {w:"งู", a:"ต่ำเดี่ยว"}, {w:"เณร", a:"ต่ำเดี่ยว"}, {w:"หนู", a:"ต่ำเดี่ยว"}, {w:"ม้า", a:"ต่ำเดี่ยว"}, {w:"ยักษ์", a:"ต่ำเดี่ยว"}, {w:"เรือ", a:"ต่ำเดี่ยว"}, {w:"ลิง", a:"ต่ำเดี่ยว"}, {w:"แหวน", a:"ต่ำเดี่ยว"},
            {w:"ควาย", a:"ต่ำคู่"}, {w:"ช้าง", a:"ต่ำคู่"}, {w:"โซ่", a:"ต่ำคู่"}, {w:"ทหาร", a:"ต่ำคู่"}, {w:"ธง", a:"ต่ำคู่"}, {w:"พาน", a:"ต่ำคู่"}, {w:"ฟัน", a:"ต่ำคู่"}
        ];
        let quizIndex = 0;

        function switchScene(id) { document.querySelectorAll('.scene').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

        // ================= คำนวณแผนที่อัจฉริยะ (เป๊ะ 100%) =================
        function drawMap() {
            let isPortrait = window.innerHeight > window.innerWidth;
            
            // ล่างขึ้นบน (มือถือ) หรือ ซ้ายไปขวา (คอม)
            layoutCoords = isPortrait ? [
                {x: 50, y: 85}, // Start (ล่างสุดกลาง)
                {x: 75, y: 68}, // 1 (ขวา)
                {x: 25, y: 51}, // 2 (ซ้าย)
                {x: 75, y: 34}, // 3 (ขวา)
                {x: 25, y: 17}  // 4 (ซ้ายบนสุด)
            ] : [
                {x: 10, y: 65}, // Start
                {x: 30, y: 35}, // 1
                {x: 50, y: 75}, // 2
                {x: 70, y: 35}, // 3
                {x: 90, y: 65}  // 4
            ];

            // วางไอคอน
            for(let i=0; i<5; i++) {
                let node = document.getElementById('node-'+i);
                node.style.left = layoutCoords[i].x + '%';
                node.style.top = layoutCoords[i].y + '%';
            }

            // วาดเส้น (SVG ViewBox 0 0 100 100 ให้แมตช์กับ %)
            let pointsString = layoutCoords.map(p => `${p.x},${p.y}`).join(' ');
            document.getElementById('svg-line').setAttribute('points', pointsString);
            
            if(document.getElementById('scene-map').classList.contains('active')) {
                updateAvatarPosition();
            }
        }
        window.onresize = drawMap; 

        // 1. กดเริ่ม
        function goToCharSelect() {
            initAudio(); 
            playerName = document.getElementById('input-name').value;
            if(!playerName) { alert('พิมพ์ชื่อก่อนนะคะ!'); return; }
            playSfx('sfx-click');
            switchScene('scene-char');
        }

        // 2. เลือกคู่หู
        function enterMap(gender) {
            playSfx('sfx-click');
            const avatarUrl = gender === 'boy' ? 'url("https://i.postimg.cc/mrSpgYMf/2.png")' : 'url("https://i.postimg.cc/TYysJW8r/1.png")';
            document.getElementById('map-avatar').style.backgroundImage = avatarUrl;
            
            drawMap(); 
            switchScene('scene-map');
            
            // วาร์ปตัวละครมาที่จุด 0 แล้วเริ่มคุย
            updateAvatarPosition();
            
            setTimeout(() => {
                showPopupDialogue(0, [`สวัสดี ${playerName}!`, `พร้อมลุย "ป่าดงดิบ" หรือยัง?`]);
            }, 800);
        }

        function updateAvatarPosition() {
            let targetNode = storyProgress === 5 ? 4 : (storyProgress >= 3 ? 3 : storyProgress);
            let avatar = document.getElementById('map-avatar');
            avatar.style.left = layoutCoords[targetNode].x + '%';
            avatar.style.top = layoutCoords[targetNode].y + '%';
        }

        // 3. ระบบนำทาง
        function resumeStory() {
            stopAllBgm();
            document.getElementById('dialogue-popup').style.display = 'none';
            updateAvatarPosition();

            let targetNode = storyProgress === 5 ? 4 : (storyProgress >= 3 ? 3 : storyProgress);

            setTimeout(() => {
                let msgs = [];
                if(storyProgress === 1) msgs = [`ถึงป่าดงดิบแล้ว!`, `ภารกิจที่ 1 อักษรกลาง รออยู่`];
                if(storyProgress === 2) msgs = [`ถึงถ้ำลึกลับแล้ว!`, `ภารกิจที่ 2 อักษรสูง ไปกันเลย!`];
                if(storyProgress === 3) msgs = [`ถึงค่ายริมน้ำ!`, `เริ่มภารกิจที่ 3 "อักษรต่ำเดี่ยว" ก่อน`];
                if(storyProgress === 4) msgs = [`เยี่ยมมาก!`, `ลุยรอบสอง "อักษรต่ำคู่"`];
                if(storyProgress === 5) msgs = [`ถึงวิหารโบราณแล้ว!`, `ลุยคำถาม 30 ข้อ 5 นาที!`];

                showPopupDialogue(targetNode, msgs, () => {
                    prepareMission(); // คุยจบ เข้าด่าน
                });
            }, 1800);
        }

        let dialogueStack = [], dialogueCb = null;
        function showPopupDialogue(nodeIndex, list, callback) {
            dialogueStack = list; dialogueCb = callback;
            let popup = document.getElementById('dialogue-popup');
            
            popup.style.left = layoutCoords[nodeIndex].x + '%';
            popup.style.top = layoutCoords[nodeIndex].y + '%';
            popup.style.display = 'flex';
            nextDialogue();
        }

        function nextDialogue() {
            playSfx('sfx-click');
            if(dialogueStack.length === 0) {
                document.getElementById('dialogue-popup').style.display = 'none';
                if(dialogueCb) dialogueCb();
                return;
            }
            document.getElementById('dialogue-text').innerText = dialogueStack.shift();
        }

        // 4. เข้าฉากหีบ
        function prepareMission() {
            switchScene('scene-game');
            document.getElementById('quiz-container').style.display = 'none';
            document.getElementById('basket').style.display = 'none';
            let chest = document.getElementById('game-chest');
            chest.style.backgroundImage = 'var(--chest-closed)';
            chest.style.display = 'block';
        }

        // 5. เปิดหีบ -> เสียงวิ๊ดด -> ปิดเสียง -> เริ่มเพลง
        function openChest() {
            let sfxChest = document.getElementById('sfx-chest');
            sfxChest.currentTime = 0; sfxChest.play(); 
            
            let chest = document.getElementById('game-chest');
            chest.style.backgroundImage = 'var(--chest-open)';
            
            setTimeout(() => {
                chest.style.display = 'none';
                let mapMsg = "";
                if(storyProgress === 1) mapMsg = "ไก่ จิก เด็ก ตาย (เด็ก ตาย) บน ปาก โอ่ง<br><span style='color:red;'>(หาอักษรกลาง 20 ตัว)</span>";
                if(storyProgress === 2) mapMsg = "ผี ฝาก ถุง ข้าว สาร ให้ ฉัน ฐาน ฃวด<br><span style='color:red;'>(ใส่อักษรสูงลงตะกร้า 20 ตัว)</span>";
                if(storyProgress === 3) mapMsg = "งู ใหญ่ นอน อยู่ ณ ริม วัด โม ฬี โลก<br><span style='color:red;'>(หาอักษรต่ำเดี่ยว 20 ตัว)</span>";
                if(storyProgress === 4) mapMsg = "พ่อ ค้า ฟัน ทอง ซื้อ ช้าง ฮูก<br><span style='color:red;'>(ใส่อักษรต่ำคู่ลงตะกร้า 20 ตัว)</span>";
                if(storyProgress === 5) mapMsg = "ตอบคำถาม 30 ข้อ 5 นาที!";

                Swal.fire({
                    title: 'ลายแทงสมบัติ!', html: mapMsg,
                    imageUrl: 'https://cdn-icons-png.flaticon.com/512/7517/7517228.png', imageWidth: 150,
                    confirmButtonText: 'ลุยเลย!', confirmButtonColor: '#8b5a2b', background: '#fff8e1', allowOutsideClick: false
                }).then(() => {
                    sfxChest.pause(); sfxChest.currentTime = 0; // ปิดเสียงวิ๊ดด
                    
                    if(storyProgress === 1) document.getElementById('bgm-m1').play();
                    if(storyProgress === 2) document.getElementById('bgm-m2').play();
                    if(storyProgress === 3 || storyProgress === 4) document.getElementById('bgm-m3').play();
                    
                    if(storyProgress === 5) startBossGame(); else startGame();
                });
            }, 1000);
        }

        // ================= มินิเกม 1-4 =================
        function startGame() {
            document.getElementById('game-hud').style.display = 'flex';
            let isBasket = (storyProgress === 2 || storyProgress === 4);
            if(isBasket) document.getElementById('basket').style.display = 'block';

            let timeLeft = 180; 
            currentScore = 0; itemsSpawned = 0;
            document.getElementById('score').innerText = currentScore + "/20";
            document.getElementById('timer').innerText = timeLeft;

            gameTimer = setInterval(() => {
                timeLeft--; document.getElementById('timer').innerText = timeLeft;
                if(timeLeft <= 0) endGame(false);
            }, 1000);

            spawnInterval = setInterval(spawnItem, 2000); 
        }

        function spawnItem() {
            if(itemsSpawned >= 20) return; 
            itemsSpawned++;

            let targetArr = storyProgress === 1 ? midCons : storyProgress === 2 ? highCons : storyProgress === 3 ? lowSingle : lowDouble;
            let isTarget = Math.random() > 0.3; // 70% ออกตัวถูกให้เด็กได้คะแนน
            let char = isTarget ? targetArr[Math.floor(Math.random()*targetArr.length)] : allCons[Math.floor(Math.random()*allCons.length)];
            
            let item = document.createElement('div');
            item.className = 'game-item'; item.innerText = char;
            item.style.left = Math.floor(Math.random() * 80) + 10 + '%';
            item.style.top = '-100px';
            
            document.getElementById('game-area').appendChild(item);
            
            let pos = -100;
            let fallSpeed = window.innerHeight / 200; 
            
            let fall = setInterval(() => {
                pos += fallSpeed;
                item.style.top = pos + 'px';
                if(pos > window.innerHeight) {
                    clearInterval(fall); item.remove();
                    if(itemsSpawned >= 20 && document.getElementById('game-area').childElementCount === 0) checkWinCondition();
                }
            }, 20);

            let isBasket = (storyProgress === 2 || storyProgress === 4);

            item.onpointerdown = function(e) {
                e.preventDefault(); clearInterval(fall);
                
                if(targetArr.includes(this.innerText)) {
                    currentScore++; document.getElementById('score').innerText = currentScore + "/20";
                    
                    if(isBasket) {
                        playSfx('sfx-drop');
                        let basket = document.getElementById('basket').getBoundingClientRect();
                        this.style.transition = "all 0.5s ease";
                        this.style.top = basket.top + "px";
                        this.style.left = (basket.left + 35) + "px";
                        this.style.transform = "scale(0)";
                    } else {
                        playSfx('sfx-correct');
                        this.style.background = "#8bc34a"; this.style.color = "#fff";
                        this.style.transform = "scale(0)";
                    }
                } else {
                    playSfx('sfx-wrong'); 
                    this.style.background = "#d32f2f"; this.style.color = "#fff";
                    this.style.transform = "scale(0)";
                }

                setTimeout(() => { 
                    this.remove(); 
                    if(itemsSpawned >= 20 && document.getElementById('game-area').childElementCount === 0) checkWinCondition();
                }, 500);
            };
        }

        function checkWinCondition() { if(currentScore >= 10) endGame(true); else endGame(false); }

        function getRewardData(score) {
            if (score >= 16) return { stars: "⭐⭐⭐", msg: "ได้รับคะแนนเต็ม + ของรางวัล!", d: 5 };
            if (score >= 11) return { stars: "⭐⭐", msg: "ได้รับคะแนน + ของรางวัล!", d: 4 };
            if (score >= 10) return { stars: "⭐", msg: "ได้รับแค่คะแนน (ไม่มีของรางวัล)", d: 3 };
            return { stars: "", msg: "ไม่ผ่านด่าน", d: 0 };
        }

        function endGame(isWin) {
            clearInterval(gameTimer); clearInterval(spawnInterval);
            document.getElementById('game-area').innerHTML = "";
            document.getElementById('game-hud').style.display = 'none';
            document.getElementById('basket').style.display = 'none';
            stopAllBgm();
            
            if(isWin) {
                let reward = getRewardData(currentScore);
                totalDiamonds += reward.d;
                
                if(storyProgress===1) scoresData.m1 = currentScore;
                if(storyProgress===2) scoresData.m2 = currentScore;
                if(storyProgress===3) scoresData.m31 = currentScore;
                if(storyProgress===4) scoresData.m32 = currentScore;

                sendDataToSheet(); // ส่งคะแนน

                let nextMsg = storyProgress === 3 ? "เตรียมตัวลุย อักษรต่ำคู่ ต่อเลย!" : "ไปด่านต่อไปกันเลย!";
                Swal.fire({ title: `ผ่านด่าน! ${reward.stars}`, text: `ได้ ${currentScore}/20 คะแนน\n${reward.msg}\n\n${nextMsg}`, icon: "success", confirmButtonColor: '#8b5a2b' })
                .then(() => { 
                    if(storyProgress===0) { storyProgress = 1; } else { storyProgress++; } 
                    switchScene('scene-map'); resumeStory(); 
                });
            } else {
                Swal.fire({ title: "ไม่ผ่านด่าน!", text: `ได้ ${currentScore} คะแนน (ต้อง 10 ขึ้นไป)\nลองใหม่สู้ๆ!`, icon: "error", confirmButtonColor: '#d32f2f' })
                .then(() => { switchScene('scene-map'); resumeStory(); }); 
            }
        }

        // ================= บอสไฟต์ 30 ข้อ 5 นาที =================
        function startBossGame() {
            document.getElementById('game-hud').style.display = 'flex';
            document.getElementById('quiz-container').style.display = 'block';
            let timeLeft = 300; 
            currentScore = 0; quizIndex = 0;
            document.getElementById('score').innerText = currentScore + "/30";
            document.getElementById('timer').innerText = timeLeft;

            quizData.sort(() => Math.random() - 0.5); // สุ่มคำถาม

            gameTimer = setInterval(() => {
                timeLeft--; document.getElementById('timer').innerText = timeLeft;
                if(timeLeft <= 0) endBoss();
            }, 1000);
            showQuiz();
        }

        function showQuiz() {
            if(quizIndex >= 30) { endBoss(); return; }
            document.getElementById('quiz-word').innerText = quizData[quizIndex].w;
        }

        function checkQuiz(ans) {
            if(quizData[quizIndex].a === ans) {
                playSfx('sfx-correct'); currentScore++; 
                document.getElementById('score').innerText = currentScore + "/30";
            } else { playSfx('sfx-wrong'); }
            quizIndex++; showQuiz();
        }

        function endBoss() {
            clearInterval(gameTimer);
            document.getElementById('quiz-container').style.display = 'none';
            document.getElementById('game-hud').style.display = 'none';
            stopAllBgm();

            if(currentScore >= 10) {
                let reward = getRewardData(Math.floor((currentScore/30)*20)); 
                totalDiamonds += reward.d;
                scoresData.m4 = currentScore;
                sendDataToSheet();

                Swal.fire({
                    title: "ปราบวิหารสำเร็จ!", html: `ตอบถูก ${currentScore}/30 ข้อ<br>${reward.stars}<br>${reward.msg}<br><br>เพชรรวมทั้งหมด ${totalDiamonds} 💎`,
                    imageUrl: 'https://cdn-icons-png.flaticon.com/512/4230/4230571.png', imageWidth: 150, 
                    confirmButtonText: 'จบเกม รับใบประกาศ!', confirmButtonColor: '#8bc34a', background: '#fff8e1', allowOutsideClick: false
                }).then(() => { location.reload(); });
            } else {
                Swal.fire({ title: "ไม่ผ่าน!", text: "ต้องถูกอย่างน้อย 10 ข้อ ลองใหม่นะ!", icon: "error" })
                .then(() => { startBossGame(); });
            }
        }

        // ================= ส่งข้อมูลเข้า Google Sheets =================
        function sendDataToSheet() {
            const formData = new FormData();
            formData.append("name", playerName);
            formData.append("m1", scoresData.m1);
            formData.append("m2", scoresData.m2);
            formData.append("m31", scoresData.m31);
            formData.append("m32", scoresData.m32);
            formData.append("m4", scoresData.m4);
            formData.append("diamonds", totalDiamonds);

            fetch(sheetUrl, { method: 'POST', body: formData, mode: 'no-cors' }).catch(e => console.log(e));
        }
    </script>
</body>
</html>
